<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>麻雀 立体卓 点数計算</title>
<style>
  :root{
    --felt:#0c1410; --felt2:#0a1f17; --ink:#ece7d6; --muted:#8c9a8f;
    --gold:#e6c878; --gold-d:#caa84a; --green:#43a86a; --red:#c8553f;
    --panel:#12161a; --panel2:#171c20; --line:rgba(255,255,255,.08);
    /* 電脳モード（ホログラム）トークン */
    --cyan:#48d6ff; --cyan-glow:#8ff0ff; --cyan-line:rgba(72,214,255,.55);
    --cyan-dim:rgba(72,214,255,.22); --holo-fill:rgba(10,20,30,.78);
    --cgold:#f0c56a; --cgold-glow:#ffe6a0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  button{touch-action:manipulation;-webkit-user-select:none;user-select:none;} /* タップ遅延・誤スクロール由来の取りこぼし対策 */
  html,body{margin:0;}
  body{background:#06090a;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    overflow-x:hidden;}
  .mincho{font-family:"Hiragino Mincho ProN","Yu Mincho","Yu Mincho JP",serif;}

  /* full-screen stage */
  #stage{position:relative;width:100%;height:100dvh;overflow:hidden;
    background:radial-gradient(130% 100% at 50% 26%,#26282c 0%,#15171a 50%,#090a0c 100%);}
  #stage canvas{display:block;width:100%;height:100%;touch-action:pan-y;}
  #vig{position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 170px 44px rgba(0,0,0,.74),inset 0 -56px 120px rgba(0,0,0,.5);}
  #threefail{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    text-align:center;padding:24px;color:var(--muted);font-size:.95rem;line-height:1.8;}

  /* top bar */
  #topbar{position:absolute;left:0;right:0;top:0;display:flex;align-items:center;justify-content:center;gap:8px;z-index:3;
    padding:max(10px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left));}
  #title{font-weight:600;letter-spacing:.16em;font-size:.82rem;color:var(--ink);pointer-events:none;}
  #title small{display:block;font-size:.54rem;letter-spacing:.3em;color:var(--gold);margin-top:1px;}
  #status{font-size:.72rem;color:var(--muted);pointer-events:none;letter-spacing:.08em;}
  #topbar .sp{flex:1;}
  .ic{appearance:none;border:1px solid var(--line);background:rgba(14,18,20,.55);color:var(--ink);
    border-radius:10px;padding:9px 14px;font-size:.74rem;font-weight:600;backdrop-filter:blur(8px);}
  .ic:active{transform:scale(.95);}
  .ic.on{color:var(--gold);border-color:rgba(230,200,120,.4);background:rgba(230,200,120,.12);}

  /* count pill */
  #cntpill{position:absolute;left:max(14px,env(safe-area-inset-left));
    bottom:calc(84px + env(safe-area-inset-bottom));z-index:3;
    font-size:.74rem;background:rgba(14,18,20,.5);border:1px solid var(--line);
    border-radius:999px;padding:5px 13px;backdrop-filter:blur(8px);pointer-events:none;}
  #cntpill b{color:var(--gold);font-weight:700;}
  #cntpill span{color:var(--muted);margin-left:8px;}

  /* palette bar */
  #palbar{position:absolute;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;gap:5px;z-index:3;
    padding:6px max(12px,env(safe-area-inset-right)) calc(6px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));
    background:linear-gradient(0deg,rgba(20,22,24,.95),rgba(20,22,24,.6) 64%,transparent);}
  #callrow{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;max-width:96vw;}
  .vsep{width:1px;align-self:stretch;margin:2px 4px;background:rgba(255,255,255,.16);}
  .cbtn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);
    border-radius:9px;padding:9px 14px;font-size:.78rem;font-weight:600;}
  .cbtn.armed{background:linear-gradient(180deg,#e2705a,#c8442e);color:#fff;border-color:#a3331f;}
  #calls{display:inline-flex;flex-wrap:wrap;gap:5px;}
  #calls .chip{border:1px solid rgba(230,200,120,.4);background:rgba(230,200,120,.14);color:var(--gold);
    border-radius:8px;padding:5px 9px;font-size:.76rem;font-weight:700;}
  #calls .chip small{color:var(--muted);font-weight:500;margin-left:4px;}
  #callhint{font-size:.74rem;color:#ff9a86;font-weight:600;min-height:1em;}
  /* 牌選択：フォルダ風タブ（横並び）＋パレット本体。牌幅にコンパクト＆中央寄せ */
  #palfolder{display:flex;flex-direction:column;align-items:stretch;width:fit-content;max-width:94vw;}
  .ftabs{display:flex;justify-content:center;gap:5px;padding:0 8px;}
  .ftabs button{appearance:none;border:1px solid var(--line);border-bottom:none;color:var(--muted);
    background:rgba(26,28,28,.72);border-radius:9px 9px 0 0;padding:3px 15px;font-size:.82rem;font-weight:700;
    position:relative;top:1px;}
  .ftabs button.on{background:rgba(46,50,46,.97);color:var(--gold);border-color:rgba(230,200,120,.45);}
  .palbody{display:flex;align-items:center;gap:8px;background:rgba(46,50,46,.97);
    border:1px solid var(--line);border-radius:0 12px 12px 12px;padding:5px 8px;
    box-shadow:0 6px 20px rgba(0,0,0,.4);}
  .pal{flex:0 1 auto;display:flex;justify-content:center;gap:5px;overflow-x:auto;padding:2px 0;scrollbar-width:none;}
  .pal::-webkit-scrollbar{display:none;}
  .pal button{flex:0 0 auto;appearance:none;border:none;background:none;padding:0;border-radius:6px;overflow:hidden;
    box-shadow:0 2px 7px rgba(0,0,0,.5);height:46px;}
  .pal button:active{transform:scale(.93);}
  .pal img{display:block;height:100%;width:auto;}
  .calc{flex:0 0 auto;border:none;color:#04210f;font-weight:800;letter-spacing:.1em;border-radius:10px;
    padding:0 14px;height:46px;font-size:.82rem;background:linear-gradient(180deg,#f0d98c,#d8b24c);
    box-shadow:0 6px 18px rgba(216,178,76,.34);}
  .calc:disabled{background:rgba(255,255,255,.06);color:var(--muted);box-shadow:none;border:1px solid var(--line);font-weight:600;}
  .calc.ready{animation:cg 2s ease-in-out infinite;}
  @keyframes cg{50%{box-shadow:0 6px 28px rgba(230,200,120,.62);}}

  /* again */
  #again{position:absolute;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));transform:translateX(-50%);
    display:none;border:1px solid var(--line);background:rgba(16,20,18,.72);color:var(--ink);z-index:3;
    border-radius:999px;padding:9px 22px;font-size:.82rem;backdrop-filter:blur(8px);}
  #again.show{display:inline-block;}

  /* settings popover */
  #setwrap{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:6;
    background:rgba(0,0,0,.55);backdrop-filter:blur(3px);}
  #setwrap.show{display:flex;}
  #setpanel{background:#11161a;border:1px solid var(--line);border-radius:16px;padding:18px;max-width:94%;
    box-shadow:0 24px 60px rgba(0,0,0,.6);}
  .set{display:flex;flex-wrap:wrap;gap:10px 14px;margin-bottom:12px;align-items:center;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{appearance:none;border:none;background:transparent;color:var(--muted);padding:7px 12px;font-size:.8rem;font-weight:600;}
  .seg button.on{background:rgba(230,200,120,.16);color:var(--gold);}
  .lab{font-size:.74rem;color:var(--muted);}
  .step{display:inline-flex;align-items:center;gap:8px;}
  .step button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:1.1rem;}
  .step b{min-width:1.4em;text-align:center;color:var(--gold);}
  #setclose{margin-top:2px;width:100%;border:none;background:linear-gradient(180deg,#f0d98c,#d8b24c);color:#04210f;font-weight:700;border-radius:10px;padding:11px;}

  /* start screen (frosted glass) */
  #startscreen{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:26px;
    background:rgba(30,32,34,.34);
    backdrop-filter:blur(5px) saturate(115%);-webkit-backdrop-filter:blur(5px) saturate(115%);
    transition:opacity 1.2s ease,backdrop-filter 1.2s ease,-webkit-backdrop-filter 1.2s ease;}
  #startscreen .st-title{font-weight:600;letter-spacing:.3em;font-size:1.5rem;color:var(--ink);
    text-shadow:0 2px 18px rgba(0,0,0,.5);}
  #startscreen .st-title small{display:block;font-size:.62rem;letter-spacing:.42em;color:var(--gold);margin-top:8px;}
  #startbtn{appearance:none;border:none;color:#04210f;font-weight:800;letter-spacing:.16em;
    border-radius:999px;padding:15px 44px;font-size:1rem;cursor:pointer;
    background:linear-gradient(180deg,#f0d98c,#d8b24c);box-shadow:0 8px 28px rgba(216,178,76,.4);
    animation:cg 2.4s ease-in-out infinite;}
  #startbtn:active{transform:scale(.96);}
  body.started #startscreen{opacity:0;backdrop-filter:blur(0);-webkit-backdrop-filter:blur(0);pointer-events:none;}
  /* UI hidden until start, then rises in */
  #topbar,#palbar,#cntpill{opacity:0;pointer-events:none;}
  body.started #topbar{opacity:1;pointer-events:auto;transition:opacity .9s ease 1s;}
  body.started #cntpill{opacity:1;transition:opacity .9s ease 1s;}
  #palbar{transform:translateY(26px);}
  body.started #palbar{opacity:1;pointer-events:auto;transform:translateY(0);
    transition:opacity .9s ease 1s,transform .9s ease 1s;}

  /* rotate hint */
  #rotate{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;background:rgba(6,9,10,.94);color:var(--ink);font-size:1.02rem;line-height:2;z-index:9;padding:24px;}
  #rotate.show{display:flex;}
  #rotate .ro{font-size:2.4rem;margin-bottom:6px;}
  /* scroll cue on table */
  #scrollcue{position:absolute;left:max(12px,env(safe-area-inset-left));bottom:calc(14px + env(safe-area-inset-bottom));
    transform:none;display:none;z-index:3;color:var(--gold);font-size:.62rem;letter-spacing:.06em;text-align:center;
    background:rgba(10,20,14,.5);border:1px solid rgba(230,200,120,.3);border-radius:999px;padding:5px 10px;
    backdrop-filter:blur(8px);animation:bob 1.6s ease-in-out infinite;}
  #scrollcue.show{display:block;}
  @keyframes bob{50%{transform:translateY(3px);}}

  /* result panel (scroll down) */
  #resultpanel{position:relative;width:100%;min-height:100dvh;
    background:radial-gradient(120% 95% at 50% 30%,#3a3d40 0%,#2b2d30 46%,#1c1e20 100%);
    display:flex;align-items:center;justify-content:center;padding:48px 24px;}
  .rp-inner{width:100%;max-width:1000px;text-align:center;}
  #rp-hint{color:var(--muted);font-size:.95rem;letter-spacing:.06em;}
  #rp-settings{display:flex;flex-direction:column;gap:12px;align-items:center;margin-bottom:26px;
    background:rgba(8,18,12,.45);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .rps-row{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;justify-content:center;}
  .tog{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);
    border-radius:9px;padding:8px 14px;font-size:.82rem;font-weight:600;}
  .tog.on{background:rgba(230,200,120,.16);color:var(--gold);border-color:rgba(230,200,120,.4);}
  #rp-rank{color:var(--gold);letter-spacing:.42em;font-size:1.05rem;font-weight:700;opacity:0;transform:scale(.4);}
  #rp-rank.show{animation:stampIn .5s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes stampIn{0%{transform:scale(1.8) rotate(-6deg);opacity:0;}60%{transform:scale(.95) rotate(-2deg);opacity:1;}100%{transform:scale(1) rotate(-2deg);opacity:1;}}
  #rp-yaku{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;margin:16px 0;}
  #rp-yaku .y{font-size:1.5rem;font-weight:700;color:#f3efe3;opacity:0;transform:translateY(10px) scale(.92);
    text-shadow:0 2px 8px rgba(0,0,0,.5);}
  #rp-yaku .y.pop{animation:yp .42s cubic-bezier(.2,1.4,.4,1) forwards;}
  #rp-yaku .y b{color:var(--red);margin-left:7px;font-weight:800;}
  @keyframes yp{to{opacity:1;transform:none;}}
  #rp-score{font-size:clamp(2.8rem,10vw,5.6rem);font-weight:300;color:var(--gold);line-height:1;
    text-shadow:0 0 40px rgba(230,200,120,.4),0 3px 14px rgba(0,0,0,.5);}
  #rp-score small{font-size:.32em;margin-left:6px;color:#cdb878;letter-spacing:.1em;}
  #rp-bd{color:#bcd0c0;font-size:.92rem;margin-top:14px;letter-spacing:.04em;}
  .rp-btns{margin-top:30px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;opacity:0;transition:opacity .4s;}
  .rp-btns.show{opacity:1;}
  .rp-btns button{border:1px solid var(--line);background:rgba(20,30,24,.6);color:var(--ink);
    border-radius:999px;padding:11px 22px;font-size:.88rem;backdrop-filter:blur(6px);}
  #rp-again{background:linear-gradient(180deg,#f0d98c,#d8b24c);color:#04210f;border:none;font-weight:700;}

  /* 役満：1枚目の画像のような巨大赤文字 */
  #resultpanel.yakuman{background:radial-gradient(120% 95% at 50% 30%,#43413a 0%,#2e2c28 46%,#1a1916 100%);}
  #resultpanel.yakuman #rp-yaku{flex-direction:column;gap:2px;margin:8px 0 18px;}
  #resultpanel.yakuman #rp-yaku .y{font-size:clamp(3rem,13vw,8rem);font-weight:800;color:#df2a1c;
    text-shadow:0 5px 0 rgba(110,8,0,.4),0 0 34px rgba(220,40,20,.35);letter-spacing:.02em;}
  #resultpanel.yakuman #rp-yaku .y b{display:none;}
  #resultpanel.yakuman #rp-score{color:#e23322;font-weight:700;text-shadow:0 0 40px rgba(220,40,20,.45);}
  #resultpanel.yakuman #rp-score small{color:#e7a59c;}
  #resultpanel.yakuman #rp-rank{color:#f0d98c;}

  /* ============ 電脳モード（ホログラムUI） ============ */
  /* ホロボタン（通常卓に埋め込まれた起動スイッチ） */
  #holobtn{position:absolute;right:max(12px,env(safe-area-inset-right));
    top:calc(max(10px,env(safe-area-inset-top)) + 2px);z-index:7;appearance:none;cursor:pointer;
    width:48px;height:48px;border-radius:50%;color:var(--gold);font-size:.58rem;font-weight:700;letter-spacing:.06em;
    background:radial-gradient(circle at 50% 38%,#2a2d31,#141619 70%);
    border:1px solid rgba(230,200,120,.35);box-shadow:0 4px 14px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);}
  #holobtn:active{transform:scale(.94);}
  #holobtn.on{color:var(--cyan);border-color:var(--cyan-line);
    box-shadow:0 0 14px rgba(72,214,255,.45),inset 0 0 10px rgba(72,214,255,.18),0 4px 14px rgba(0,0,0,.5);}
  body:not(.started) #holobtn{opacity:0;pointer-events:none;}
  body.started #holobtn{opacity:1;transition:opacity .9s ease 1s;}
  /* システム名タグ（電脳時のみ） */
  #systag{position:absolute;left:max(14px,env(safe-area-inset-left));top:max(10px,env(safe-area-inset-top));
    z-index:3;display:none;font-size:.62rem;letter-spacing:.18em;color:var(--cyan);
    border:1px solid var(--cyan-dim);padding:4px 10px;pointer-events:none;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
    background:var(--holo-fill);}
  #systag b{color:var(--cgold);font-weight:700;}
  body.cyber #systag{display:block;}
  /* 覚醒スイープ（クラス付与で1回走る） */
  @keyframes traceRun{from{background-position:-130% 0}to{background-position:230% 0}}
  .awaken{position:relative;}
  .awaken::after{content:"";position:absolute;inset:0;pointer-events:none;clip-path:inherit;
    background:linear-gradient(100deg,transparent,rgba(143,240,255,.5),transparent) -130% 0/55% 100% no-repeat;
    animation:traceRun .75s ease-out both;}
  /* ---- UIの電脳スキン ---- */
  body.cyber{background:#04070d;}
  body.cyber #stage{background:radial-gradient(130% 100% at 50% 26%,#12203a 0%,#0a1322 50%,#04070d 100%);}
  body.cyber #vig{box-shadow:inset 0 0 170px 44px rgba(2,8,18,.8),inset 0 -56px 120px rgba(2,8,18,.55);}
  body.cyber #status{color:var(--cyan);letter-spacing:.14em;border:1px solid var(--cyan-dim);
    padding:4px 12px;background:var(--holo-fill);
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
  body.cyber #cntpill{border-radius:0;border:1px solid var(--cyan-line);background:var(--holo-fill);
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
    box-shadow:0 0 10px rgba(72,214,255,.22);}
  body.cyber #cntpill b{color:var(--cgold);}
  body.cyber #cntpill span{color:var(--cyan);}
  /* 空中に浮くホログラム板：帯背景をほぼ消し、板が卓上に浮いて見えるように */
  body.cyber #palbar{background:linear-gradient(0deg,rgba(3,8,16,.72),rgba(3,8,16,.24) 55%,transparent);gap:8px;}
  /* タブ＝独立した浮遊チップ（フォルダ見出しをやめる） */
  body.cyber .ftabs{gap:9px;padding:0;margin-bottom:2px;}
  body.cyber .ftabs button{top:0;border-radius:0;border:1px solid var(--cyan-line);color:var(--cyan);
    letter-spacing:.22em;padding:6px 18px;
    background:linear-gradient(180deg,rgba(24,44,66,.5),rgba(8,18,32,.45));
    clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);
    box-shadow:0 0 0 1px rgba(72,214,255,.16) inset,0 0 14px rgba(72,214,255,.14) inset;
    filter:drop-shadow(0 0 9px rgba(72,214,255,.4)) drop-shadow(0 7px 10px rgba(0,0,0,.45));}
  body.cyber .ftabs button.on{color:var(--cgold);border-color:rgba(240,197,106,.7);
    background:linear-gradient(180deg,rgba(56,46,20,.5),rgba(26,20,8,.45));
    box-shadow:0 0 0 1px rgba(240,197,106,.22) inset,0 0 14px rgba(240,197,106,.16) inset;
    filter:drop-shadow(0 0 10px rgba(240,197,106,.45)) drop-shadow(0 7px 10px rgba(0,0,0,.45));}
  /* パレット本体＝奥に少し倒れた浮遊パネル（ゆっくり浮遊） */
  @keyframes holoFloat{0%,100%{transform:perspective(950px) rotateX(5.5deg) translateY(0)}
    50%{transform:perspective(950px) rotateX(5.5deg) translateY(-2.5px)}}
  body.cyber .palbody{border-radius:0;border:none;background:
      repeating-linear-gradient(180deg,rgba(72,214,255,.05) 0 2px,transparent 2px 5px),
      linear-gradient(180deg,rgba(16,32,50,.6),rgba(6,14,26,.64));
    clip-path:polygon(13px 0,calc(100% - 13px) 0,100% 13px,100% calc(100% - 13px),
      calc(100% - 13px) 100%,13px 100%,0 calc(100% - 13px),0 13px);
    box-shadow:0 0 0 1px var(--cyan-line) inset,0 0 20px rgba(72,214,255,.15) inset;
    filter:drop-shadow(0 0 13px rgba(72,214,255,.38)) drop-shadow(0 12px 18px rgba(0,0,0,.55));
    animation:holoFloat 4.4s ease-in-out infinite;}
  /* 遠近台形（PAL_PERSP試験）：フォルダ全体を奥へ倒し「手前広・奥窄まり」の板に。JS側でperspective変形を合成 */
  body.cyber.palpersp #palfolder{transform-origin:50% 100%;transform:perspective(640px) rotateX(17deg);}
  body.cyber.palpersp .palbody{animation:none;} /* 二重変形を避ける */
  body.cyber .cbtn,body.cyber .ic{border-radius:0;border:1px solid var(--cyan-line);
    background:linear-gradient(180deg,rgba(20,38,58,.45),rgba(8,18,32,.42));
    color:var(--cyan);letter-spacing:.08em;backdrop-filter:none;
    clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);
    filter:drop-shadow(0 0 7px rgba(72,214,255,.32)) drop-shadow(0 6px 9px rgba(0,0,0,.45));}
  body.cyber .cbtn:active,body.cyber .ic:active{color:#fff;filter:brightness(1.7) drop-shadow(0 0 8px var(--cyan-glow));}
  body.cyber .cbtn.armed{background:rgba(240,197,106,.16);color:var(--cgold);border-color:rgba(240,197,106,.6);
    filter:drop-shadow(0 0 7px rgba(240,197,106,.45));}
  body.cyber .ic.on{color:var(--cgold);border-color:rgba(240,197,106,.5);background:rgba(240,197,106,.1);}
  body.cyber .vsep{background:var(--cyan-dim);}
  body.cyber #callhint{color:var(--cyan-glow);}

    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}

    border:1px solid rgba(240,197,106,.75);letter-spacing:.14em;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
    box-shadow:0 0 0 1px rgba(240,197,106,.3) inset,0 0 14px rgba(240,197,106,.25);}
  body.cyber .calc:disabled{background:rgba(10,18,26,.7);color:rgba(72,214,255,.4);border:1px solid var(--cyan-dim);box-shadow:none;}
  body.cyber .calc.ready{animation:cgc 2s ease-in-out infinite;}

    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
</style>

<script>
/* ============ scoring engine （流用・変更なし） ============ */
const DRAGONS=[31,32,33],WINDS=[27,28,29,30],TH=[0,8,9,17,18,26,27,28,29,30,31,32,33];
const isTermHonor=i=>i>=27||i%9===0||i%9===8;
const isTerminalNum=i=>i<27&&(i%9===0||i%9===8);
function meldSets(counts){const c=counts.slice(),res=[];
  (function rec(start,acc){let i=start;while(i<34&&c[i]===0)i++;
    if(i===34){res.push(acc.slice());return;}
    if(c[i]>=3){c[i]-=3;acc.push({type:'kou',t:i});rec(i,acc);acc.pop();c[i]+=3;}
    if(i<27&&i%9<=6&&c[i+1]>0&&c[i+2]>0){c[i]--;c[i+1]--;c[i+2]--;acc.push({type:'shun',t:i});rec(i,acc);acc.pop();c[i]++;c[i+1]++;c[i+2]++;}
  })(0,[]);return res;}
function decompConcealed(cc){const res=[];for(let p=0;p<34;p++){if(cc[p]>=2){const c=cc.slice();c[p]-=2;
  for(const s of meldSets(c))res.push({pair:p,melds:s});}}return res;}
function isChiitoi(c){let pr=0;for(let i=0;i<34;i++){if(c[i]===2)pr++;else if(c[i]!==0)return false;}return pr===7;}
function isKokushi(c){let pair=false;for(let i=0;i<34;i++){if(TH.includes(i)){if(c[i]===2)pair=true;else if(c[i]!==1)return false;}else if(c[i]!==0)return false;}return pair;}
const up100=x=>Math.ceil(x/100)*100;
function scoreHanFu(han,fu,ctx){let base,rank='';
  if(han>=13){base=8000;rank='数え役満';}else if(han>=11){base=6000;rank='三倍満';}
  else if(han>=8){base=4000;rank='倍満';}else if(han>=6){base=3000;rank='跳満';}
  else if(han>=5){base=2000;rank='満貫';}else{base=fu*Math.pow(2,2+han);if(base>=2000){base=2000;rank='満貫';}}
  const d=ctx.dealer,t=ctx.tsumo;let total,bd;
  if(d){if(t){const e=up100(base*2);total=e*3;bd=e.toLocaleString()+' オール';}else{total=up100(base*6);bd='放銃 '+total.toLocaleString();}}
  else{if(t){const pd=up100(base*2),pc=up100(base*1);total=pd+pc*2;bd='子'+pc.toLocaleString()+' / 親'+pd.toLocaleString();}else{total=up100(base*4);bd='放銃 '+total.toLocaleString();}}
  return{total,rank,bd};}
function scoreYakuman(m,ctx){const base=8000*m,d=ctx.dealer,t=ctx.tsumo;let total,bd;
  if(d){if(t){const e=base*2;total=e*3;bd=e.toLocaleString()+' オール';}else{total=base*6;bd='放銃 '+(base*6).toLocaleString();}}
  else{if(t){total=base*2+base*2;bd='子'+base.toLocaleString()+' / 親'+(base*2).toLocaleString();}else{total=base*4;bd='放銃 '+(base*4).toLocaleString();}}
  return{total,bd};}
function suitAllSame(c){let s=-1;for(let i=0;i<27;i++)if(c[i]>0){const x=Math.floor(i/9);if(s<0)s=x;else if(s!==x)return false;}return true;}
function isChuuren(c){let s=-1;for(let i=0;i<27;i++)if(c[i]>0){const x=Math.floor(i/9);if(s<0)s=x;else if(s!==x)return false;}
  for(let i=27;i<34;i++)if(c[i]>0)return false;if(s<0)return false;const b=s*9,need=[3,1,1,1,1,1,1,1,3];let ex=0;
  for(let k=0;k<9;k++){const e=c[b+k]-need[k];if(e<0)return false;ex+=e;}return ex===1;}

function analyzeFull(decomp,calls,winTile,inPair,meldIdx,full,ctx,menzen){
  const conc=decomp.melds.map(m=>({type:m.type,t:m.t,open:false,kan:false,hand:true}));
  const all=conc.concat(calls);
  const pair=decomp.pair;
  const shuns=all.filter(m=>m.type==='shun'),kous=all.filter(m=>m.type==='kou');
  const isYakuhai=i=>DRAGONS.includes(i)||i===ctx.roundWind||i===ctx.seatWind;
  const K=(o,c)=>menzen?c:o;
  let wait='ryanmen';
  if(inPair)wait='tanki';
  else if(meldIdx>=0){const m=conc[meldIdx];
    if(m.type==='kou')wait='shanpon';
    else if(winTile===m.t+1)wait='kanchan';
    else if(winTile===m.t)wait=(m.t%9===6)?'penchan':'ryanmen';
    else wait=(m.t%9===0)?'penchan':'ryanmen';}
  function isConcKou(m){if(m.type!=='kou')return false;
    if(m.hand){if(!ctx.tsumo&&wait==='shanpon'&&meldIdx>=0&&conc[meldIdx]===m)return false;return true;}
    return m.kan&&!m.open;}
  const ankou=kous.filter(isConcKou).length;
  const kanCount=kous.filter(m=>m.kan).length;

  const ym=[];
  if(kanCount===4)ym.push(['四槓子',1]);
  if(kous.length>=4&&ankou===4)ym.push(wait==='tanki'?['四暗刻単騎',2]:['四暗刻',1]);
  if(DRAGONS.every(dr=>kous.some(m=>m.t===dr)))ym.push(['大三元',1]);
  let allH=true;for(let i=0;i<27;i++)if(full[i]>0)allH=false;if(allH)ym.push(['字一色',1]);
  let allT=true;for(let i=0;i<34;i++)if(full[i]>0&&!isTerminalNum(i))allT=false;if(allT)ym.push(['清老頭',1]);
  const greens=[19,20,21,23,25,32];let allG=true;for(let i=0;i<34;i++)if(full[i]>0&&!greens.includes(i))allG=false;if(allG)ym.push(['緑一色',1]);
  const wk=WINDS.filter(w=>kous.some(m=>m.t===w)).length;
  if(wk===4)ym.push(['大四喜',2]);else if(wk===3&&WINDS.includes(pair))ym.push(['小四喜',1]);
  if(menzen&&suitAllSame(full)&&isChuuren(full)){
    const s=Math.floor(winTile/9)*9,t=full.slice();t[winTile]--;
    const pure=[3,1,1,1,1,1,1,1,3];let jun=true;for(let k=0;k<9;k++)if(t[s+k]!==pure[k])jun=false;
    ym.push(jun?['純正九蓮宝燈',2]:['九蓮宝燈',1]);}
  if(ctx.tenhou&&ctx.dealer)ym.push(['天和',1]);
  if(ctx.chiihou&&!ctx.dealer)ym.push(['地和',1]);
  if(ym.length){const mult=ym.reduce((s,x)=>s+x[1],0),sc=scoreYakuman(mult,ctx);
    return{yaku:ym.map(x=>({name:x[0],han:x[1]*13})),han:mult*13,fu:0,total:sc.total,bd:sc.bd,rank:(mult>1?(('〇一二三四五六七八九十'[mult]||mult)+'倍役満'):'役満'),yakuman:true,wait};}

  const yaku=[];let han=0;const add=(n,h)=>{yaku.push({name:n,han:h});han+=h;};
  if(menzen&&ctx.doubleRiichi)add('ダブル立直',2);
  else if(menzen&&ctx.riichi)add('立直',1);
  if(menzen&&ctx.ippatsu&&(ctx.riichi||ctx.doubleRiichi))add('一発',1);
  if(menzen&&ctx.tsumo)add('門前清自摸和',1);
  if(ctx.haitei&&ctx.tsumo)add('海底摸月',1);
  if(ctx.houtei&&!ctx.tsumo)add('河底撈魚',1);
  if(ctx.rinshan&&ctx.tsumo)add('嶺上開花',1);
  if(ctx.chankan&&!ctx.tsumo)add('槍槓',1);
  const pinfu=menzen&&shuns.length===4&&!isYakuhai(pair)&&wait==='ryanmen';
  if(pinfu)add('平和',1);
  let tanyao=true;for(const i of TH)if(full[i]>0)tanyao=false;if(tanyao)add('断幺九',1);
  if(menzen){const sk=shuns.map(m=>m.t).sort((a,b)=>a-b);let pp=0;for(let i=0;i<sk.length-1;i++){if(sk[i]===sk[i+1]){pp++;i++;}}
    if(pp===2)add('二盃口',3);else if(pp===1)add('一盃口',1);}
  kous.forEach(m=>{if(m.t===31)add('役牌 白',1);if(m.t===32)add('役牌 發',1);if(m.t===33)add('役牌 中',1);
    if(m.t===ctx.roundWind)add('役牌 場風',1);if(m.t===ctx.seatWind)add('役牌 自風',1);});
  const sh=shuns.map(m=>m.t);
  for(const b of[0,1,2,3,4,5,6])if(sh.includes(b)&&sh.includes(b+9)&&sh.includes(b+18)){add('三色同順',K(1,2));break;}
  for(const s of[0,9,18])if(sh.includes(s)&&sh.includes(s+3)&&sh.includes(s+6)){add('一気通貫',K(1,2));break;}
  if(kous.length===4)add('対々和',2);
  if(ankou===3&&kous.length>=3)add('三暗刻',2);
  for(let n=0;n<9;n++)if(kous.some(m=>m.t===n)&&kous.some(m=>m.t===n+9)&&kous.some(m=>m.t===n+18)){add('三色同刻',2);break;}
  const dk=DRAGONS.filter(dr=>kous.some(m=>m.t===dr)).length;if(dk===2&&DRAGONS.includes(pair))add('小三元',2);
  const setTH=all.map(m=>m.type==='kou'?isTermHonor(m.t):(m.t%9===0||m.t%9===6));
  const everyTH=setTH.every(x=>x)&&isTermHonor(pair),hasShun=shuns.length>0;
  let anyHonor=false;for(let i=27;i<34;i++)if(full[i]>0)anyHonor=true;
  if(everyTH&&hasShun){if(!anyHonor)add('純全帯幺九',K(2,3));else add('混全帯幺九',K(1,2));}
  else if(everyTH&&!hasShun)add('混老頭',2);
  if(suitAllSame(full)){let hH=false;for(let i=27;i<34;i++)if(full[i]>0)hH=true;let hN=false;for(let i=0;i<27;i++)if(full[i]>0)hN=true;
    if(hN&&!hH)add('清一色',K(5,6));else if(hN&&hH)add('混一色',K(2,3));}
  if(han===0)return null;

  let fu=20;
  if(menzen&&!ctx.tsumo)fu+=10;
  if(ctx.tsumo&&!pinfu)fu+=2;
  if(['kanchan','penchan','tanki'].includes(wait))fu+=2;
  if(DRAGONS.includes(pair))fu+=2;
  if(pair===ctx.roundWind)fu+=2;
  if(pair===ctx.seatWind)fu+=2;
  kous.forEach(m=>{const th=isTermHonor(m.t);let f;
    if(m.kan){f=m.open?(th?16:8):(th?32:16);}
    else{const c=isConcKou(m);f=c?(th?8:4):(th?4:2);}
    fu+=f;});
  if(pinfu)fu=ctx.tsumo?20:30;
  fu=Math.ceil(fu/10)*10;if(!pinfu&&fu<30)fu=30;
  const totalHan=han+(ctx.dora||0),sc=scoreHanFu(totalHan,fu,ctx);
  const yl=yaku.slice();if(ctx.dora)yl.push({name:'ドラ',han:ctx.dora});
  return{yaku:yl,han:totalHan,fu,total:sc.total,bd:sc.bd,rank:sc.rank,wait};
}
function sitYaku(ctx,menzen){
  const yl=[];let han=0;const add=(n,h)=>{yl.push({name:n,han:h});han+=h;};
  if(ctx.doubleRiichi)add('ダブル立直',2);else if(ctx.riichi)add('立直',1);
  if(ctx.ippatsu&&(ctx.riichi||ctx.doubleRiichi))add('一発',1);
  if(ctx.tsumo)add('門前清自摸和',1);
  if(ctx.haitei&&ctx.tsumo)add('海底摸月',1);
  if(ctx.houtei&&!ctx.tsumo)add('河底撈魚',1);
  return{yl,han};
}
function calcHand(concealed,calls,ctx){
  calls=calls||[];const m=calls.length;
  if(m>4)return{error:'鳴き・カンは4つまでです'};
  const need=14-3*m;
  if(concealed.length!==need)return{error:`手牌を${need}枚にしてください`};
  const cc=new Array(34).fill(0);concealed.forEach(t=>cc[t]++);
  const full=cc.slice();
  calls.forEach(c=>{if(c.type==='shun'){full[c.t]++;full[c.t+1]++;full[c.t+2]++;}else{full[c.t]+=(c.kan?4:3);}});
  const menzen=calls.every(c=>!c.open);
  let best=null;const pick=c=>{if(c&&(!best||c.total>best.total||(c.total===best.total&&c.han>best.han)))best=c;};
  if(m===0){
    if(isKokushi(cc)){const thirteen=cc[ctx.winTile]===2,mult=thirteen?2:1,sc=scoreYakuman(mult,ctx);
      pick({yaku:[{name:thirteen?'国士無双十三面':'国士無双',han:13}],han:13*mult,fu:0,total:sc.total,bd:sc.bd,rank:thirteen?'二倍役満':'役満',yakuman:true});}
    if(isChiitoi(cc)){const s=sitYaku(ctx,true);let han=2+s.han;const yl=[{name:'七対子',han:2}].concat(s.yl);
      let tanyao=true;for(const i of TH)if(cc[i]>0)tanyao=false;if(tanyao){han++;yl.push({name:'断幺九',han:1});}
      if(suitAllSame(cc)){let hH=false;for(let i=27;i<34;i++)if(cc[i]>0)hH=true;let hN=false;for(let i=0;i<27;i++)if(cc[i]>0)hN=true;
        if(hN&&!hH){han+=6;yl.push({name:'清一色',han:6});}else if(hN&&hH){han+=3;yl.push({name:'混一色',han:3});}}
      const totalHan=han+(ctx.dora||0);if(ctx.dora)yl.push({name:'ドラ',han:ctx.dora});
      const sc=scoreHanFu(totalHan,25,ctx);pick({yaku:yl,han:totalHan,fu:25,total:sc.total,bd:sc.bd,rank:sc.rank});}
  }
  for(const d of decompConcealed(cc)){
    const pl=[];
    if(d.pair===ctx.winTile)pl.push({inPair:true,meldIdx:-1});
    d.melds.forEach((mm,idx)=>{if(mm.type==='kou'&&mm.t===ctx.winTile)pl.push({inPair:false,meldIdx:idx});
      if(mm.type==='shun'&&(ctx.winTile===mm.t||ctx.winTile===mm.t+1||ctx.winTile===mm.t+2))pl.push({inPair:false,meldIdx:idx});});
    if(!pl.length)pl.push({inPair:false,meldIdx:-1});
    for(const p of pl)pick(analyzeFull(d,calls,ctx.winTile,p.inPair,p.meldIdx,full,ctx,menzen));
  }
  if(!best)return{error:'役がありません（あがれない手です）'};
  return best;
}

/* ============ tile faces （流用） ============ */
const KANJI=['一','二','三','四','五','六','七','八','九'];
const NPOS={
 1:[[.5,.5]],2:[[.5,.3],[.5,.7]],3:[[.28,.26],[.5,.5],[.72,.74]],
 4:[[.32,.3],[.68,.3],[.32,.7],[.68,.7]],5:[[.3,.27],[.7,.27],[.5,.5],[.3,.73],[.7,.73]],
 6:[[.32,.27],[.68,.27],[.32,.5],[.68,.5],[.32,.73],[.68,.73]],
 7:[[.28,.2],[.5,.27],[.72,.34],[.34,.62],[.66,.62],[.34,.8],[.66,.8]],

    const sc=document.createElement('canvas');sc.width=w;sc.height=h;const sg=sc.getContext('2d');

  const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');
  const gr=g.createRadialGradient(64,64,4,64,64,64);
  gr.addColorStop(0,'rgba(160,238,255,0.95)');gr.addColorStop(0.45,'rgba(110,228,255,0.4)');gr.addColorStop(1,'rgba(110,228,255,0)');

  return new THREE.CanvasTexture(c);
}
function showWinRing(x,z){

  const r2=new THREE.Mesh(new THREE.RingGeometry(0.44,0.465,48),mat2);r2.rotation.x=-Math.PI/2;r2.position.y=0.006;

      clearcoat:0.45,clearcoatRoughness:0.3,envMapIntensity:0.6}); // 象牙＋ラッカー風コート＋柔らかな映り込み（白飛びは抑制）

function rndJ(a){return (Math.random()*2-1)*a;}
let meldTiles=[]; // 鳴き（副露）の3D牌。手牌とは別グループ
function buildHand(){
  if(!THREE_OK)return;
  clearTenbo();hideWinRing();
  tiles.forEach(t=>scene.remove(t.outer));tiles=[];
  meldTiles.forEach(t=>scene.remove(t.outer));meldTiles=[];
  fallen=false;camP=0;applyCam();
  const nConc=sortedHand.length;
  const handStep=T.W+T.GAP, meldStep=T.W+0.02, groupGap=T.W*0.45; // ブロック内は密着／手牌・鳴き間は隙間（少し詰めた）
  const handW = nConc>0 ? (nConc-1)*handStep+T.W : 0;
  const meldInfo = calls.map(c=>{const cnt=c.kan?4:3;return {c,cnt,w:(cnt-1)*meldStep+T.W};});
  let total=handW; meldInfo.forEach((m,idx)=>{total+=((nConc>0||idx>0)?groupGap:0)+m.w;});
  let left=-total/2; // 全体（手牌＋鳴き）を中央寄せ
  // 伏せ手牌
  sortedHand.forEach((i,k)=>{const win=(k===winPos);const t=makeTile(i,win);
    const sz=T.Z+(win?0.14:0),x=left+T.W/2+k*handStep;
    t.outer.position.set(x,0,sz);t.outer.rotation.y=0;t.mesh.rotation.x=0;t.mesh.position.set(0,T.H/2,0);
    t.stand={x,z:sz};scene.add(t.outer);tiles.push(t);});
  if(nConc>0)left+=handW;
  // 鳴きブロック（隙間を空けて右へ＝別グループと分かる）
  meldInfo.forEach((m,idx)=>{
    if(nConc>0||idx>0)left+=groupGap;
    const c=m.c,vals=c.type==='shun'?[c.t,c.t+1,c.t+2]:[c.t,c.t,c.t,c.t];
    for(let j=0;j<m.cnt;j++){
      const faceDown=(c.type==='kou'&&c.kan&&!c.open&&(j===0||j===m.cnt-1)); // 暗カンの両端は裏向き
      const t=makeTile(vals[j],false),x=left+T.W/2+j*meldStep,by=faceDown?Math.PI:0;
      t.outer.position.set(x,0,T.Z);t.outer.rotation.y=by;t.mesh.rotation.x=0;t.mesh.position.set(0,T.H/2,0);
      t.stand={x,z:T.Z};t.baseYaw=by;t.faceDown=faceDown;
      scene.add(t.outer);meldTiles.push(t);
    }

  });

  tiles.forEach((t,k)=>{
    if(k===winPos)t.flat={x:1.9,z:T.Z+T.H*0.95+0.2,yaw:0.5}; // あがり牌：手前右に出して斜めに置き目立たせる
    else t.flat={x:t.stand.x+rndJ(0.02),z:T.Z+rndJ(0.04),yaw:rndJ(0.06)};
  });
  meldTiles.forEach(t=>{t.flat={x:t.stand.x,z:t.stand.z,yaw:0};}); // 鳴きもその場で倒れる
}
function applyCam(){
  const a=CAM.stand,b=CAM.reveal,e=camP,L=(p,q)=>p+(q-p)*e;
  let px=L(a.pos[0],b.pos[0]),py=L(a.pos[1],b.pos[1]),pz=L(a.pos[2],b.pos[2]);
  let lx=L(a.look[0],b.look[0]),ly=L(a.look[1],b.look[1]),lz=L(a.look[2],b.look[2]);
  if(e<0.5){
    // pinch zoom: scale camera distance from the look point
    const dx=px-lx,dy=py-ly,dz=pz-lz;
    px=lx+dx*userZoom;py=ly+dy*userZoom;pz=lz+dz*userZoom;
    // first-person sway: shift camera, nudge look slightly the same way
    px+=swayX;py+=swayY;lx+=swayX*0.4;ly+=swayY*0.4;
  }
  camera.position.set(px,py,pz);
  camera.up.set(L(a.up[0],b.up[0]),L(a.up[1],b.up[1]),L(a.up[2],b.up[2])).normalize();
  camera.lookAt(lx,ly,lz);
  if(!curLook)curLook=new THREE.Vector3();curLook.set(lx,ly,lz);
}
function fitCam(){const vfov=FOV*Math.PI/180,a=Math.max(0.35,camera.aspect),half=Math.tan(vfov/2);
  let ds=11.8/(2*half*a);ds=Math.max(8.4,ds);CAM.stand.pos[2]=T.Z+ds; // 収め幅を広げて手牌の左右に余裕（14枚で約9.7幅＋余白）
  let dr=10.8/(2*half*a);dr=Math.max(7,dr);CAM.reveal.pos[1]=dr;
  sizeResultPlane();}
function sizeResultPlane(){if(!resultPlane)return;
  const vfov=FOV*Math.PI/180,a=Math.max(0.35,camera.aspect),dr=CAM.reveal.pos[1];
  const visH=2*dr*Math.tan(vfov/2),visW=visH*a;
  resultPlane.geometry.dispose();
  resultPlane.geometry=new THREE.PlaneGeometry(visW*0.98,visH*0.98);
  resultPlane.position.set(0,0.02,CAM.reveal.look[2]);
  const cw=1280,ch=Math.max(420,Math.round(1280*visH/visW));
  if(resultCanvas.width!==cw||resultCanvas.height!==ch){resultCanvas.width=cw;resultCanvas.height=ch;}}
function resize(){if(!renderer)return;const host=document.getElementById('stage');
  const w=host.clientWidth,h=host.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
  if(composer)composer.setSize(w,h);
  if(bokehPass){const pr=renderer.getPixelRatio();
    bokehPass.renderTargetDepth.setSize(Math.round(w*pr),Math.round(h*pr));
    bokehPass.uniforms['aspect'].value=camera.aspect;}
  fitCam();applyCam();
  document.getElementById('rotate').classList.toggle('show', h>w*1.05);}
function loop(now){const t=(now||performance.now());tickTweens(t);
  if(camP<0.0001){
    // 待機中もゆっくり呼吸するように揺れる
    const idleX=Math.sin(t*0.00045)*0.09+Math.sin(t*0.0011)*0.03;
    const idleY=Math.cos(t*0.00033)*0.06+Math.cos(t*0.00091)*0.02;
    swayX+=((tgtSwayX+idleX)-swayX)*0.06;swayY+=((tgtSwayY+idleY)-swayY)*0.06;applyCam();}
  if(cyberMix>0.001&&cyberFx.built){
    // ホロ板の浮遊＆リング回転（電脳の生きた空気）
    for(const f of cyberFx.floaters){f.m.position.y=f.y0+Math.sin(t*0.0006+f.ph)*0.055;
      f.m.rotation.y=f.r0+Math.sin(t*0.00033+f.ph)*0.03;}
    if(cyberFx.winRing){cyberFx.winRing.g1.rotation.y=t*0.00045;cyberFx.winRing.g2.rotation.y=-t*0.0011;}
  }
  if(cyberOn&&camP<0.0001){
    // UIのホロ板を視線（sway）に合わせて僅かにパララックス
    if(!_pfEl)_pfEl=document.getElementById('palfolder');
    if(!_crEl)_crEl=document.getElementById('callrow');
    const px=-swayX*7,py=swayY*5;
    if(_pfEl)_pfEl.style.transform='translate('+px+'px,'+py+'px)'+(PAL_PERSP?' perspective(640px) rotateX(17deg)':'');
    if(_crEl)_crEl.style.transform='translate('+(px*0.55)+'px,'+(py*0.55)+'px)';
  }
  if(usePost&&composer){
    try{
      if(bokehPass){
        if(!_fpt)_fpt=new THREE.Vector3();
        if(camP<0.0001)_fpt.set(0,T.H/2,T.Z);     // 待機時は手牌の列の奥行きを基準に
        else if(curLook)_fpt.copy(curLook);        // 演出（俯瞰）時は注視点
        camera.updateMatrixWorld();
        camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
        _fpt.applyMatrix4(camera.matrixWorldInverse);
        bokehPass.uniforms['focus'].value=-_fpt.z; // 背景（卓・山牌・河）のボケ基準。手牌は前景でくっきり
      }
      camera.layers.set(0);                 // (1) 背景のみをDoFで描画
      composer.render();
      const ac=renderer.autoClear;renderer.autoClear=false;renderer.clearDepth();
      camera.layers.set(1);                 // (2) 手牌・結果をDoF無しでくっきり上描き
      renderer.render(scene,camera);
      renderer.autoClear=ac;camera.layers.enableAll();
    }catch(e){console.warn('layered DoF render failed',e);usePost=false;camera.layers.enableAll();}
  } else if(renderer){camera.layers.enableAll();renderer.render(scene,camera);}
  requestAnimationFrame(loop);}

function chamferPath(g,x,y,w,h,ch){
  g.beginPath();g.moveTo(x+ch,y);g.lineTo(x+w-ch,y);g.lineTo(x+w,y+ch);g.lineTo(x+w,y+h-ch);
  g.lineTo(x+w-ch,y+h);g.lineTo(x+ch,y+h);g.lineTo(x,y+h-ch);g.lineTo(x,y+ch);g.closePath();}

function onPick(e){
  if(fallen||!tiles.length)return;
  const rect=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-rect.left)/rect.width)*2-1;
  pointer.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(tiles.map(t=>t.mesh),false);
  if(hits.length){const mesh=hits[0].object,idx=tiles.findIndex(t=>t.mesh===mesh);
    if(idx>=0){winPos=idx;ensureCtx();clack();render();}}
}
/* ---- pinch zoom + first-person sway ---- */
function onPtrDown(e){ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){const p=[...ptrs.values()];
    pinchStartDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);pinchStartZoom=userZoom;}}
function onPtrMove(e){
  if(ptrs.has(e.pointerId))ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size>=2){const p=[...ptrs.values()];const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchStartDist>0&&d>0)userZoom=Math.min(1.8,Math.max(0.55,pinchStartZoom*(pinchStartDist/d)));return;}
  const rect=renderer.domElement.getBoundingClientRect();
  const nx=((e.clientX-rect.left)/rect.width)*2-1,ny=((e.clientY-rect.top)/rect.height)*2-1;
  tgtSwayX=nx*0.55;tgtSwayY=-ny*0.36;}
function onPtrUp(e){ptrs.delete(e.pointerId);if(ptrs.size<2)pinchStartDist=0;}

/* falling + reveal */
function fallAndReveal(r){
  ensureCtx();
  const place=(t,e)=>{const s=t.stand,f=t.flat,dir=t.faceDown?1:-1; // 裏向きは逆に倒して「裏」を上にする
    t.mesh.rotation.x=dir*Math.PI/2*e;
    t.mesh.position.y=T.H/2+(T.D/2-T.H/2)*e;
    t.outer.position.x=s.x+(f.x-s.x)*e;
    t.outer.position.z=s.z+(f.z-s.z)*e;
    t.outer.rotation.y=(t.baseYaw||0)+f.yaw*e;}; // 鳴き(裏向き等)のベース回転を保持
  const wf=tiles[winPos]&&tiles[winPos].flat; // 電脳時：あがり牌の着地点に投影リング
  if(reduce){fallen=true;camP=1;applyCam();tiles.concat(meldTiles).forEach(t=>place(t,1));
    if(cyberOn&&wf)showWinRing(wf.x,wf.z);
    showResult(r,true);return;}
  fallen=true;gong();
  tween(1000,0,(e)=>{camP=e;applyCam();});
  const n=tiles.length;
  tiles.forEach((t,k)=>tween(470,k*55,(e)=>place(t,e)));
  meldTiles.forEach((t,k)=>tween(470,(n+k)*40,(e)=>place(t,e))); // 鳴きもその場で倒す
  const fallEnd=(n-1)*55+470;
  if(cyberOn&&wf)setTimeout(()=>showWinRing(wf.x,wf.z),fallEnd+120);
  setTimeout(()=>showResult(r,false),fallEnd+260);
}

/* ============ 点棒（支払い）演出 ============ */
/* 点数分の点棒を画面手前（+z）外の上空から放物線で卓上へ放り投げる。
   俯瞰カメラ（up=[0,0,-1]）なので +z が画面手前。盤面中央のスコアを避け、右下寄りに山を作る。 */
let tenbos=[];                              // 現在卓上の点棒メッシュ
const TENBO={L:1.5,W:0.17,H:0.09};          // 点棒の寸法（長辺/幅/高さ・視認性重視で大きめ）
let tenboTexCache={};
// 点棒の上面テクスチャ（額面ごとに点パターンを変える）
function tenboTexture(denom){
  if(tenboTexCache[denom])return tenboTexCache[denom];
  const W=512,H=64,c=document.createElement('canvas');c.width=W;c.height=H;const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#f8f2e3');grd.addColorStop(0.5,'#efe7d2');grd.addColorStop(1,'#e3d8be');
  g.fillStyle=grd;g.fillRect(0,0,W,H);
  const cy=H/2;
  const dot=(x,r,col)=>{g.beginPath();g.arc(x,cy,r,0,Math.PI*2);g.fillStyle=col;g.fill();
    g.lineWidth=1.4;g.strokeStyle='rgba(0,0,0,.18)';g.stroke();};
  const row=(n,r,col,span)=>{const s=span||W*0.78,x0=W/2-s/2;
    for(let i=0;i<n;i++)dot(x0+(n>1?s*(i/(n-1)):s/2),r,col);};
  if(denom===100){ row(8,5,'#1d1d1d'); }                                   // 100点：黒点
  else if(denom===1000){ row(5,8,'#d8352a'); }                            // 1000点：赤点
  else if(denom===5000){                                                  // 5000点：中央青＋赤
    dot(W/2,12,'#2f6fd0');[W*0.30,W*0.70].forEach(x=>dot(x,8,'#d8352a'));
    [W*0.12,W*0.88].forEach(x=>dot(x,6,'#2f6fd0'));
  } else {                                                                // 10000点：金中央＋虹
    dot(W/2,14,'#e8b53a');
    const cols=['#d8352a','#2f6fd0','#3aa758','#d8352a','#2f6fd0','#3aa758'];
    [W*0.18,W*0.31,W*0.40,W*0.60,W*0.69,W*0.82].forEach((x,i)=>dot(x,7,cols[i]));
  }
  const t=new THREE.CanvasTexture(c);t.anisotropy=4;if(THREE.sRGBEncoding!==undefined)t.encoding=THREE.sRGBEncoding;
  return tenboTexCache[denom]=t;
}
function makeTenbo(denom){
  // FBXモデルがあればそれを使う（テクスチャは牌と同じ Mahjong.png）
  if(tenboGeoms&&tenboGeoms[denom]){
    const mat=new THREE.MeshStandardMaterial({map:atlasTex,roughness:0.5,metalness:0.0});
    const mesh=new THREE.Mesh(tenboGeoms[denom],mat);
    mesh.castShadow=true;mesh.receiveShadow=true;return mesh;
  }
  // フォールバック：手作りの箱＋点テクスチャ
  const geo=new THREE.BoxGeometry(TENBO.L,TENBO.H,TENBO.W);
  const body=new THREE.MeshStandardMaterial({color:0xeee4cd,roughness:0.55,metalness:0.0});
  const top=new THREE.MeshStandardMaterial({map:tenboTexture(denom),roughness:0.5,metalness:0.0});
  // BoxGeometryの面順 [+x,-x,+y,-y,+z,-z]：上面(+y, index2)だけ点パターン
  const mesh=new THREE.Mesh(geo,[body,body,top,body,body,body]);
  mesh.userData.ownGeo=true;
  mesh.castShadow=true;mesh.receiveShadow=true;return mesh;
}
// 点棒FBX（assets/Mahjong_Tenbow.fbx）の各額面を読み込み TENBO 寸法へ正規化
let tenboGeoms=null;
function loadTenboFBX(cb){
  if(!THREE||!THREE.FBXLoader){cb&&cb(false);return;}
  new THREE.FBXLoader().load('assets/Mahjong_Tenbow.fbx',obj=>{
    try{
      obj.updateWorldMatrix(true,true);
      const byName={};obj.traverse(c=>{if(c.isMesh)byName[c.name]=c;});
      const map={100:'TenBow_100',1000:'TenBow_1000',5000:'TenBow_5000',10000:'TenBow_10000'};
      const out={};
      Object.keys(map).forEach(d=>{
        const m=byName[map[d]];if(!m||!m.geometry)return;
        const g=m.geometry.clone();g.applyMatrix4(m.matrixWorld);
        g.computeBoundingBox();const ctr=new THREE.Vector3();g.boundingBox.getCenter(ctr);g.translate(-ctr.x,-ctr.y,-ctr.z);
        let sz=new THREE.Vector3();g.computeBoundingBox();g.boundingBox.getSize(sz);
        // 一番薄い軸を厚み(y)へ：印字面の法線＝薄い軸なので、印字面が上(+y)になる
        if(sz.x<=sz.y&&sz.x<=sz.z){g.rotateZ(Math.PI/2);}        // 薄い軸がx → y へ
        else if(sz.z<=sz.x&&sz.z<=sz.y){g.rotateX(Math.PI/2);}   // 薄い軸がz → y へ
        g.computeBoundingBox();g.boundingBox.getSize(sz);
        if(sz.z>sz.x){g.rotateY(Math.PI/2);g.computeBoundingBox();g.boundingBox.getSize(sz);} // 長辺を x へ
        g.scale(TENBO.L/sz.x,TENBO.H/sz.y,TENBO.W/sz.z);g.computeVertexNormals();
        out[d]=g;
      });
      tenboGeoms=Object.keys(out).length?out:null;
      cb&&cb(!!tenboGeoms);
    }catch(e){console.warn('tenbo fbx build failed',e);cb&&cb(false);}
  },undefined,err=>{console.warn('tenbo fbx load error',err);cb&&cb(false);});
}
// 点数を 10000/5000/1000/100 の点棒へ分解（安全のため枚数上限）
function tenboBreakdown(total){
  const denoms=[10000,5000,1000,100];let rem=Math.max(0,Math.round(total));const out=[];
  denoms.forEach(d=>{let c=Math.floor(rem/d);rem-=c*d;while(c-->0)out.push(d);});
  return out.slice(0,14);
}
function clearTenbo(){if(!scene)return;
  // FBXジオメトリは共有なので破棄しない。手作り箱(ownGeo)のみ破棄。
  tenbos.forEach(m=>{scene.remove(m);if(m.userData&&m.userData.ownGeo&&m.geometry)m.geometry.dispose();});tenbos=[];}
function throwTenbo(total,instant){
  if(!THREE_OK||!scene)return;clearTenbo();
  const list=tenboBreakdown(total);if(!list.length)return;
  // 倒れた牌に被らない右下（+x=右, +z=手前）の空きスペースへ着地。
  // 重ならないよう「ほぼ平行・小ジッタ」の段組みにし、本数が多い時は上に積む。
  const cx=3.3,cz=3.0,dz=0.30,maxRows=5; // 牌とx方向で分離（被らない）＋手前に出しすぎない高さ
  const N=list.length;
  list.forEach((denom,k)=>{
    const mesh=makeTenbo(denom);
    const layer=Math.floor(k/maxRows), row=k%maxRows;            // 6本ごとに次の段へ
    const rowsHere=Math.min(N-layer*maxRows,maxRows);
    const tx=cx+rndJ(0.1)+layer*0.05;                            // 段ごとに少しズラす
    const tz=cz+(row-(rowsHere-1)/2)*dz+rndJ(0.02);             // z方向に等間隔（重ならない）
    const ty=TENBO.H*0.5+0.02+layer*TENBO.H*0.92;               // 上の段は積み重なる
    const yaw=rndJ(0.08);                                        // ほぼ平行（重なり防止）
    if(instant){mesh.position.set(tx,ty,tz);mesh.rotation.set(0,yaw,0);scene.add(mesh);tenbos.push(mesh);return;}
    // 画面手前外（+z＝画面下）のすぐ外から放物線で飛び込む
    const sx=tx+rndJ(0.6), sz=5.8+rndJ(0.4), sy=2.1+rndJ(0.3);
    mesh.position.set(sx,sy,sz);
    const dx=tx-sx,dzz=tz-sz,dl=Math.hypot(dx,dzz)||1,ndx=dx/dl,ndz=dzz/dl; // 進行方向（着地後の転がり用）
    const spin0=(Math.random()*2-1)*Math.PI*1.5, tilt0=(Math.random()*2-1)*0.9;
    const rollExtra=(Math.random()*2-1)*0.06, slide=0.04+Math.random()*0.08; // 着地後の小さな転がり（重ねないよう控えめ）
    scene.add(mesh);tenbos.push(mesh);
    tween(540,k*100,(e,p)=>{
      mesh.position.x=sx+(tx-sx)*e;mesh.position.z=sz+(tz-sz)*e;
      mesh.position.y=sy+(ty-sy)*e+Math.sin(Math.PI*p)*0.9; // 放物線
      mesh.rotation.y=yaw+spin0*(1-e);mesh.rotation.x=tilt0*(1-e);
    },()=>{
      clack();
      // 着地後に少し転がって止まる：進行方向へ滑りつつ小バウンド＋回転して減速
      tween(280,0,(e,p)=>{
        mesh.position.x=tx+ndx*slide*e;mesh.position.z=tz+ndz*slide*e;
        mesh.position.y=ty+Math.sin(Math.PI*p)*0.05*(1-p);
        mesh.rotation.y=yaw+rollExtra*e;mesh.rotation.x=0;
      },()=>{mesh.position.set(tx+ndx*slide,ty,tz+ndz*slide);mesh.rotation.set(0,yaw+rollExtra,0);});
    });
  });
}

  const pal=document.getElementById('pal');pal.innerHTML='';pal.classList.toggle('honors',suit===3);
  const list=suit<3?[0,1,2,3,4,5,6,7,8].map(n=>suit*9+n):[27,28,29,30,31,32,33];
  list.forEach(i=>{const b=document.createElement('button');const im=new Image();im.src=palImg(i);im.alt='';b.appendChild(im);
    b.onclick=()=>paletteTap(i);pal.appendChild(b);});
}
/* ---- 鳴き・カン（副露） ---- */
function needConc(){return 14-3*calls.length;}                 // 必要な手牌（伏せ）枚数
function paletteTap(i){ if(callMode) addCall(i); else addTile(i); }
function tileName(i){const names=['一','二','三','四','五','六','七','八','九'];
  return i<27?names[i%9]+['萬','筒','索'][Math.floor(i/9)]:['東','南','西','北','白','發','中'][i-27];}
function armCall(type){
  callMode=(callMode===type)?null:type;
  document.querySelectorAll('#callrow .cbtn').forEach(b=>b.classList.toggle('armed',b.dataset.c===callMode));
  const names={pon:'ポン',chi:'チー',minkan:'明カン',ankan:'暗カン'};
  document.getElementById('callhint').textContent=callMode?(names[callMode]+'にする牌を下からタップ'):'';
}
function addCall(i){
  if(calls.length>=4){armCall(callMode);return;}
  let c;
  if(callMode==='pon')c={type:'kou',t:i,open:true,kan:false};
  else if(callMode==='minkan')c={type:'kou',t:i,open:true,kan:true};
  else if(callMode==='ankan')c={type:'kou',t:i,open:false,kan:true};
  else if(callMode==='chi'){if(i>=27||i%9>6){document.getElementById('callhint').textContent='チーは数牌の1〜7（順子の先頭）をタップ';return;}
    c={type:'shun',t:i,open:true,kan:false};}
  if(!c)return;
  ensureCtx();calls.push(c);callMode=null;
  document.querySelectorAll('#callrow .cbtn').forEach(b=>b.classList.remove('armed'));
  document.getElementById('callhint').textContent='';
  while(hand.length>needConc())hand.pop();          // 鳴きで手牌上限が減るので調整
  clack();render();
}
function renderCalls(){
  const box=document.getElementById('calls');if(!box)return;box.innerHTML='';
  calls.forEach((c,idx)=>{const chip=document.createElement('span');chip.className='chip';
    const kind=c.type==='shun'?'チー':(c.kan?(c.open?'明カン':'暗カン'):'ポン');
    const face=c.type==='shun'?(tileName(c.t)+tileName(c.t+1)+tileName(c.t+2)):tileName(c.t);
    chip.innerHTML=face+'<small>'+kind+' ×</small>';
    chip.title='タップで削除';chip.onclick=()=>{calls.splice(idx,1);render();};
    box.appendChild(chip);});
}
function addTile(i){if(hand.length>=needConc())return;if(hand.filter(x=>x===i).length>=4)return;
  ensureCtx();hand.push(i);
  // 末尾に入れた牌をあがり牌に（同種は最後の位置）
  const sorted=hand.slice().sort((a,b)=>a-b);let idx=-1;for(let k=0;k<sorted.length;k++)if(sorted[k]===i)idx=k;winPos=idx;
  clack();render();}
function bindSeg(id,fn){const box=document.getElementById(id);box.querySelectorAll('button').forEach(b=>{b.onclick=()=>{
  box.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');fn(b.dataset.v);render();};});}

document.querySelectorAll('#callrow .cbtn').forEach(b=>b.onclick=()=>armCall(b.dataset.c));
document.getElementById('undo').onclick=()=>{if(callMode){armCall(callMode);return;}
  if(hand.length)hand.pop();else if(calls.length)calls.pop();render();};
document.getElementById('clear').onclick=()=>{hand=[];calls=[];callMode=null;winPos=0;
  document.querySelectorAll('#callrow .cbtn').forEach(b=>b.classList.remove('armed'));
  document.getElementById('callhint').textContent='';render();};
document.getElementById('calc').onclick=()=>{if(lastValid&&lastResult){ensureCtx();fallAndReveal(lastResult);}};
document.getElementById('rp-again').onclick=()=>{if(!lastResult)return;userZoom=1;scrollToTable();
  setTimeout(()=>{if(resultPlane)resultPlane.visible=false;buildHand();setTimeout(()=>fallAndReveal(lastResult),150);},reduce?0:520);};
document.getElementById('rp-edit').onclick=()=>{userZoom=1;buildHand();hideResult();scrollToTable();}; // 演出後はズームを既定へ戻す
document.getElementById('scrollcue').onclick=scrollToResult;
document.getElementById('tabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  document.getElementById('tabs').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');buildPalette(+b.dataset.s);});
// 親/子・ロン/ツモは設定パネルとスクロール先の両方を同期
function syncSeg(id,val){const box=document.getElementById(id);if(!box)return;
  box.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.v===val));}
// 状況役（海底/河底/嶺上/槍槓）は同時に一つだけ。一発は独立。
const SIT_EX=[{id:'haitei',k:'haitei',tsumo:true},{id:'houtei',k:'houtei',tsumo:false},
              {id:'rinshan',k:'rinshan',tsumo:true},{id:'chankan',k:'chankan',tsumo:false}];
function refreshSit(){SIT_EX.forEach(o=>{const b=document.getElementById(o.id);if(b)b.classList.toggle('on',!!S[o.k]);});
  const ib=document.getElementById('ippatsu');if(ib)ib.classList.toggle('on',S.ippatsu);}
function setDealer(v){S.dealer=v;syncSeg('who',v?'oya':'ko');syncSeg('who2',v?'oya':'ko');render();}
function setTsumo(v){S.tsumo=v;syncSeg('win',v?'tsumo':'ron');syncSeg('win2',v?'tsumo':'ron');
  // ツモ専用(海底/嶺上)・ロン専用(河底/槍槓)で矛盾するものを解除
  if(v){S.houtei=false;S.chankan=false;}else{S.haitei=false;S.rinshan=false;}
  refreshSit();render();}
function setRiichi(v){S.riichi=(v==='on'||v==='double');S.dbl=(v==='double');
  syncSeg('riichi',v);syncSeg('riichi2',v);
  if(!S.riichi){S.ippatsu=false;refreshSit();}render();}
function setRound(v){S.roundWind=+v;syncSeg('round',v);syncSeg('round2',v);render();}
function setSeat(v){S.seatWind=+v;syncSeg('seat',v);syncSeg('seat2',v);render();}
function setDora(n){S.dora=Math.min(20,Math.max(0,n));
  ['dv','dv2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=S.dora;});render();}
function bindBoth(ids,fn){ids.forEach(id=>{const box=document.getElementById(id);if(!box)return;
  box.querySelectorAll('button').forEach(b=>b.onclick=()=>fn(b.dataset.v));});}
bindBoth(['who','who2'],v=>setDealer(v==='oya'));
bindBoth(['win','win2'],v=>setTsumo(v==='tsumo'));
bindBoth(['riichi','riichi2'],setRiichi);
bindBoth(['round','round2'],setRound);
bindBoth(['seat','seat2'],setSeat);
SIT_EX.forEach(o=>{const b=document.getElementById(o.id);if(!b)return;
  b.onclick=()=>{const now=!S[o.k];SIT_EX.forEach(x=>S[x.k]=false);S[o.k]=now;
    if(now)setTsumo(o.tsumo);else{refreshSit();render();}};});
const _ip=document.getElementById('ippatsu');
_ip.onclick=()=>{S.ippatsu=!S.ippatsu;_ip.classList.toggle('on',S.ippatsu);render();};
['dp','dp2'].forEach(id=>{const b=document.getElementById(id);if(b)b.onclick=()=>setDora(S.dora+1);});
['dm','dm2'].forEach(id=>{const b=document.getElementById(id);if(b)b.onclick=()=>setDora(S.dora-1);});
document.getElementById('gear').onclick=()=>document.getElementById('setwrap').classList.add('show');
document.getElementById('setclose').onclick=()=>document.getElementById('setwrap').classList.remove('show');
document.getElementById('setwrap').onclick=(e)=>{if(e.target.id==='setwrap')e.currentTarget.classList.remove('show');};
document.getElementById('snd').onclick=()=>{soundOn=!soundOn;const b=document.getElementById('snd');
  b.classList.toggle('on',soundOn);b.textContent=soundOn?'効果音':'消音';if(soundOn)ensureCtx();};
document.getElementById('holobtn').onclick=()=>{ensureCtx();setCyber(!cyberOn);};

document.getElementById('startbtn').onclick=()=>{ensureCtx();document.body.classList.add('started');};

buildPalette(0);
loadThree(ok=>{
  const st=document.getElementById('status');
  if(!ok||!window.THREE){THREE_OK=false;document.getElementById('threefail').style.display='flex';st.textContent='';return;}
  try{THREE_OK=true;initScene();st.textContent='牌を並べてください';render();
    if(DOF_ON)loadPost(ok2=>{if(!ok2)return;try{initComposer();usePost=true;}catch(e){console.warn('DoF init failed',e);usePost=false;}});
    if(USE_FBX)loadFBXTiles(ok3=>{if(ok3){loadTenboFBX(()=>{});
      loadAtlasImg(()=>refreshPalette()); // パレットボタンを3D牌と同じ絵柄に作り直す
      render();}});}
  catch(e){console.warn(e);THREE_OK=false;document.getElementById('threefail').style.display='flex';st.textContent='';}
});
</script>
</body>
