<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>麻雀 立体卓 点数計算</title>
<style>
  :root{
    --felt:#0c1410; --felt2:#0a1f17; --ink:#ece7d6; --muted:#8c9a8f;
    --gold:#e6c878; --gold-d:#caa84a; --green:#43a86a; --red:#c8553f;
    --panel:#12161a; --panel2:#171c20; --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{background:#06090a;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    overflow-x:hidden;}
  .mincho{font-family:"Hiragino Mincho ProN","Yu Mincho","Yu Mincho JP",serif;}

  /* full-screen stage */
  #stage{position:relative;width:100%;height:100dvh;overflow:hidden;
    background:radial-gradient(130% 100% at 50% 26%,#26282c 0%,#15171a 50%,#090a0c 100%);}
  #stage canvas{display:block;width:100%;height:100%;touch-action:pan-y;}
  #vig{position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 170px 44px rgba(0,0,0,.74),inset 0 -56px 120px rgba(0,0,0,.5);}
  #threefail{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    text-align:center;padding:24px;color:var(--muted);font-size:.95rem;line-height:1.8;}

  /* top bar */
  #topbar{position:absolute;left:0;right:0;top:0;display:flex;align-items:center;justify-content:center;gap:8px;z-index:3;
    padding:max(10px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left));}
  #title{font-weight:600;letter-spacing:.16em;font-size:.82rem;color:var(--ink);pointer-events:none;}
  #title small{display:block;font-size:.54rem;letter-spacing:.3em;color:var(--gold);margin-top:1px;}
  #status{font-size:.72rem;color:var(--muted);pointer-events:none;letter-spacing:.08em;}
  #topbar .sp{flex:1;}
  .ic{appearance:none;border:1px solid var(--line);background:rgba(14,18,20,.55);color:var(--ink);
    border-radius:10px;padding:7px 11px;font-size:.74rem;font-weight:600;backdrop-filter:blur(8px);}
  .ic:active{transform:scale(.95);}
  .ic.on{color:var(--gold);border-color:rgba(230,200,120,.4);background:rgba(230,200,120,.12);}

  /* count pill */
  #cntpill{position:absolute;left:max(14px,env(safe-area-inset-left));
    bottom:calc(84px + env(safe-area-inset-bottom));z-index:3;
    font-size:.74rem;background:rgba(14,18,20,.5);border:1px solid var(--line);
    border-radius:999px;padding:5px 13px;backdrop-filter:blur(8px);pointer-events:none;}
  #cntpill b{color:var(--gold);font-weight:700;}
  #cntpill span{color:var(--muted);margin-left:8px;}

  /* palette bar */
  #palbar{position:absolute;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:3;
    padding:8px max(12px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));
    background:linear-gradient(0deg,rgba(20,22,24,.95),rgba(20,22,24,.6) 64%,transparent);}
  #ctrlrow{display:flex;justify-content:center;gap:8px;}
  #palrow{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;}
  .tabs{display:flex;flex-direction:column;gap:4px;}
  .tabs button{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted);
    border-radius:8px;width:36px;padding:5px 0;font-size:.84rem;font-weight:700;}
  .tabs button.on{background:rgba(230,200,120,.16);color:var(--gold);border-color:rgba(230,200,120,.4);}
  .pal{flex:0 1 auto;display:flex;justify-content:center;gap:5px;overflow-x:auto;padding:2px 0;scrollbar-width:none;}
  .pal::-webkit-scrollbar{display:none;}
  .pal button{flex:0 0 auto;appearance:none;border:none;background:none;padding:0;border-radius:6px;overflow:hidden;
    box-shadow:0 2px 7px rgba(0,0,0,.5);height:42px;}
  .pal button:active{transform:scale(.93);}
  .pal img{display:block;height:100%;width:auto;}
  .calc{flex:0 0 auto;border:none;color:#04210f;font-weight:800;letter-spacing:.1em;border-radius:10px;
    padding:0 14px;height:42px;font-size:.82rem;background:linear-gradient(180deg,#f0d98c,#d8b24c);
    box-shadow:0 6px 18px rgba(216,178,76,.34);}
  .calc:disabled{background:rgba(255,255,255,.06);color:var(--muted);box-shadow:none;border:1px solid var(--line);font-weight:600;}
  .calc.ready{animation:cg 2s ease-in-out infinite;}
  @keyframes cg{50%{box-shadow:0 6px 28px rgba(230,200,120,.62);}}

  /* again */
  #again{position:absolute;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));transform:translateX(-50%);
    display:none;border:1px solid var(--line);background:rgba(16,20,18,.72);color:var(--ink);z-index:3;
    border-radius:999px;padding:9px 22px;font-size:.82rem;backdrop-filter:blur(8px);}
  #again.show{display:inline-block;}

  /* settings popover */
  #setwrap{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:6;
    background:rgba(0,0,0,.55);backdrop-filter:blur(3px);}
  #setwrap.show{display:flex;}
  #setpanel{background:#11161a;border:1px solid var(--line);border-radius:16px;padding:18px;max-width:94%;
    box-shadow:0 24px 60px rgba(0,0,0,.6);}
  .set{display:flex;flex-wrap:wrap;gap:10px 14px;margin-bottom:12px;align-items:center;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .seg button{appearance:none;border:none;background:transparent;color:var(--muted);padding:7px 12px;font-size:.8rem;font-weight:600;}
  .seg button.on{background:rgba(230,200,120,.16);color:var(--gold);}
  .lab{font-size:.74rem;color:var(--muted);}
  .step{display:inline-flex;align-items:center;gap:8px;}
  .step button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:1.1rem;}
  .step b{min-width:1.4em;text-align:center;color:var(--gold);}
  #setclose{margin-top:2px;width:100%;border:none;background:linear-gradient(180deg,#f0d98c,#d8b24c);color:#04210f;font-weight:700;border-radius:10px;padding:11px;}

  /* start screen (frosted glass) */
  #startscreen{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:26px;
    background:rgba(30,32,34,.34);
    backdrop-filter:blur(20px) saturate(120%);-webkit-backdrop-filter:blur(20px) saturate(120%);
    transition:opacity 1.2s ease,backdrop-filter 1.2s ease,-webkit-backdrop-filter 1.2s ease;}
  #startscreen .st-title{font-weight:600;letter-spacing:.3em;font-size:1.5rem;color:var(--ink);
    text-shadow:0 2px 18px rgba(0,0,0,.5);}
  #startscreen .st-title small{display:block;font-size:.62rem;letter-spacing:.42em;color:var(--gold);margin-top:8px;}
  #startbtn{appearance:none;border:none;color:#04210f;font-weight:800;letter-spacing:.16em;
    border-radius:999px;padding:15px 44px;font-size:1rem;cursor:pointer;
    background:linear-gradient(180deg,#f0d98c,#d8b24c);box-shadow:0 8px 28px rgba(216,178,76,.4);
    animation:cg 2.4s ease-in-out infinite;}
  #startbtn:active{transform:scale(.96);}
  body.started #startscreen{opacity:0;backdrop-filter:blur(0);-webkit-backdrop-filter:blur(0);pointer-events:none;}
  /* UI hidden until start, then rises in */
  #topbar,#palbar,#cntpill{opacity:0;pointer-events:none;}
  body.started #topbar{opacity:1;pointer-events:auto;transition:opacity .9s ease 1s;}
  body.started #cntpill{opacity:1;transition:opacity .9s ease 1s;}
  #palbar{transform:translateY(26px);}
  body.started #palbar{opacity:1;pointer-events:auto;transform:translateY(0);
    transition:opacity .9s ease 1s,transform .9s ease 1s;}

  /* rotate hint */
  #rotate{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;background:rgba(6,9,10,.94);color:var(--ink);font-size:1.02rem;line-height:2;z-index:9;padding:24px;}
  #rotate.show{display:flex;}
  #rotate .ro{font-size:2.4rem;margin-bottom:6px;}
  /* scroll cue on table */
  #scrollcue{position:absolute;left:max(12px,env(safe-area-inset-left));bottom:calc(14px + env(safe-area-inset-bottom));
    transform:none;display:none;z-index:3;color:var(--gold);font-size:.62rem;letter-spacing:.06em;text-align:center;
    background:rgba(10,20,14,.5);border:1px solid rgba(230,200,120,.3);border-radius:999px;padding:5px 10px;
    backdrop-filter:blur(8px);animation:bob 1.6s ease-in-out infinite;}
  #scrollcue.show{display:block;}
  @keyframes bob{50%{transform:translateY(3px);}}

  /* result panel (scroll down) */
  #resultpanel{position:relative;width:100%;min-height:100dvh;
    background:radial-gradient(120% 95% at 50% 30%,#3a3d40 0%,#2b2d30 46%,#1c1e20 100%);
    display:flex;align-items:center;justify-content:center;padding:48px 24px;}
  .rp-inner{width:100%;max-width:1000px;text-align:center;}
  #rp-hint{color:var(--muted);font-size:.95rem;letter-spacing:.06em;}
  #rp-settings{display:flex;flex-direction:column;gap:12px;align-items:center;margin-bottom:26px;
    background:rgba(8,18,12,.45);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .rps-row{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;justify-content:center;}
  .tog{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);
    border-radius:9px;padding:8px 14px;font-size:.82rem;font-weight:600;}
  .tog.on{background:rgba(230,200,120,.16);color:var(--gold);border-color:rgba(230,200,120,.4);}
  #rp-rank{color:var(--gold);letter-spacing:.42em;font-size:1.05rem;font-weight:700;opacity:0;transform:scale(.4);}
  #rp-rank.show{animation:stampIn .5s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes stampIn{0%{transform:scale(1.8) rotate(-6deg);opacity:0;}60%{transform:scale(.95) rotate(-2deg);opacity:1;}100%{transform:scale(1) rotate(-2deg);opacity:1;}}
  #rp-yaku{display:flex;flex-wrap:wrap;gap:8px 16px;justify-content:center;margin:16px 0;}
  #rp-yaku .y{font-size:1.5rem;font-weight:700;color:#f3efe3;opacity:0;transform:translateY(10px) scale(.92);
    text-shadow:0 2px 8px rgba(0,0,0,.5);}
  #rp-yaku .y.pop{animation:yp .42s cubic-bezier(.2,1.4,.4,1) forwards;}
  #rp-yaku .y b{color:var(--red);margin-left:7px;font-weight:800;}
  @keyframes yp{to{opacity:1;transform:none;}}
  #rp-score{font-size:clamp(2.8rem,10vw,5.6rem);font-weight:300;color:var(--gold);line-height:1;
    text-shadow:0 0 40px rgba(230,200,120,.4),0 3px 14px rgba(0,0,0,.5);}
  #rp-score small{font-size:.32em;margin-left:6px;color:#cdb878;letter-spacing:.1em;}
  #rp-bd{color:#bcd0c0;font-size:.92rem;margin-top:14px;letter-spacing:.04em;}
  .rp-btns{margin-top:30px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;opacity:0;transition:opacity .4s;}
  .rp-btns.show{opacity:1;}
  .rp-btns button{border:1px solid var(--line);background:rgba(20,30,24,.6);color:var(--ink);
    border-radius:999px;padding:11px 22px;font-size:.88rem;backdrop-filter:blur(6px);}
  #rp-again{background:linear-gradient(180deg,#f0d98c,#d8b24c);color:#04210f;border:none;font-weight:700;}

  /* 役満：1枚目の画像のような巨大赤文字 */
  #resultpanel.yakuman{background:radial-gradient(120% 95% at 50% 30%,#43413a 0%,#2e2c28 46%,#1a1916 100%);}
  #resultpanel.yakuman #rp-yaku{flex-direction:column;gap:2px;margin:8px 0 18px;}
  #resultpanel.yakuman #rp-yaku .y{font-size:clamp(3rem,13vw,8rem);font-weight:800;color:#df2a1c;
    text-shadow:0 5px 0 rgba(110,8,0,.4),0 0 34px rgba(220,40,20,.35);letter-spacing:.02em;}
  #resultpanel.yakuman #rp-yaku .y b{display:none;}
  #resultpanel.yakuman #rp-score{color:#e23322;font-weight:700;text-shadow:0 0 40px rgba(220,40,20,.45);}
  #resultpanel.yakuman #rp-score small{color:#e7a59c;}
  #resultpanel.yakuman #rp-rank{color:#f0d98c;}
</style>
</head>
<body>
  <div id="stage">
    <div id="vig"></div>
    <div id="topbar">
      <div id="status"></div>
    </div>

    <div id="cntpill"><b id="cnt">0</b>/14<span id="wlab"></span></div>
    <div id="scrollcue">▼ メニュー</div>

    <div id="palbar">
      <div id="palrow">
        <div class="tabs" id="tabs">
          <button data-s="0" class="on">萬</button><button data-s="1">筒</button>
          <button data-s="2">索</button><button data-s="3">字</button>
        </div>
        <div class="pal" id="pal"></div>
        <button class="calc" id="calc" disabled>計算開始</button>
      </div>
      <div id="ctrlrow">
        <button class="ic" id="undo">戻す</button>
        <button class="ic" id="clear">クリア</button>
        <button class="ic on" id="snd">効果音</button>
        <button class="ic" id="gear">設定</button>
      </div>
    </div>

    <div id="startscreen">
      <div class="st-title">麻雀 点数計算<small>TABLE SCORING</small></div>
      <button id="startbtn">使用スタート</button>
    </div>

    <div id="threefail">3D表示を読み込めませんでした。<br>通信環境をご確認のうえ、ページを再読み込みしてください。</div>
    <div id="rotate"><div class="ro">↻</div>横画面にしてお楽しみください</div>

    <div id="setwrap"><div id="setpanel">
      <div class="set">
        <span class="seg" id="who"><button data-v="ko" class="on">子</button><button data-v="oya">親</button></span>
        <span class="seg" id="win"><button data-v="ron" class="on">ロン</button><button data-v="tsumo">ツモ</button></span>
        <span class="seg" id="riichi"><button data-v="off" class="on">立直なし</button><button data-v="on">立直</button><button data-v="double">ダブル</button></span>
      </div>
      <div class="set">
        <span class="lab">場風</span><span class="seg" id="round"><button data-v="27" class="on">東</button><button data-v="28">南</button></span>
        <span class="lab">自風</span><span class="seg" id="seat"><button data-v="27">東</button><button data-v="28" class="on">南</button><button data-v="29">西</button><button data-v="30">北</button></span>
        <span class="step"><span class="lab">ドラ</span><button id="dm">−</button><b id="dv">0</b><button id="dp">＋</button></span>
      </div>
      <button id="setclose">閉じる</button>
    </div></div>
  </div>

  <section id="resultpanel">
    <div class="rp-inner">
      <div id="rp-settings">
        <div class="rps-row">
          <span class="lab">親・子</span>
          <span class="seg" id="who2"><button data-v="ko" class="on">子</button><button data-v="oya">親</button></span>
          <span class="lab">あがり</span>
          <span class="seg" id="win2"><button data-v="ron" class="on">ロン</button><button data-v="tsumo">ツモ</button></span>
        </div>
        <div class="rps-row">
          <span class="lab">特殊</span>
          <button class="tog" id="haitei">海底摸月</button>
          <button class="tog" id="houtei">河底撈魚</button>
          <button class="tog" id="ippatsu">一発</button>
        </div>
      </div>
      <div id="rp-hint">「計算開始」を押すと、上の卓に結果が表示されます</div>
      <div id="rp-bd"></div>
      <div class="rp-btns" id="rp-btns">
        <button id="rp-again">演出をもう一度</button>
        <button id="rp-edit">手牌にもどる</button>
      </div>
    </div>
  </section>

<script>
/* ============ scoring engine （流用・変更なし） ============ */
const DRAGONS=[31,32,33],WINDS=[27,28,29,30],TH=[0,8,9,17,18,26,27,28,29,30,31,32,33];
const isTermHonor=i=>i>=27||i%9===0||i%9===8;
const isTerminalNum=i=>i<27&&(i%9===0||i%9===8);
function meldSets(counts){const c=counts.slice(),res=[];
  (function rec(start,acc){let i=start;while(i<34&&c[i]===0)i++;
    if(i===34){res.push(acc.slice());return;}
    if(c[i]>=3){c[i]-=3;acc.push({type:'kou',t:i});rec(i,acc);acc.pop();c[i]+=3;}
    if(i<27&&i%9<=6&&c[i+1]>0&&c[i+2]>0){c[i]--;c[i+1]--;c[i+2]--;acc.push({type:'shun',t:i});rec(i,acc);acc.pop();c[i]++;c[i+1]++;c[i+2]++;}
  })(0,[]);return res;}
function decompConcealed(cc){const res=[];for(let p=0;p<34;p++){if(cc[p]>=2){const c=cc.slice();c[p]-=2;
  for(const s of meldSets(c))res.push({pair:p,melds:s});}}return res;}
function isChiitoi(c){let pr=0;for(let i=0;i<34;i++){if(c[i]===2)pr++;else if(c[i]!==0)return false;}return pr===7;}
function isKokushi(c){let pair=false;for(let i=0;i<34;i++){if(TH.includes(i)){if(c[i]===2)pair=true;else if(c[i]!==1)return false;}else if(c[i]!==0)return false;}return pair;}
const up100=x=>Math.ceil(x/100)*100;
function scoreHanFu(han,fu,ctx){let base,rank='';
  if(han>=13){base=8000;rank='数え役満';}else if(han>=11){base=6000;rank='三倍満';}
  else if(han>=8){base=4000;rank='倍満';}else if(han>=6){base=3000;rank='跳満';}
  else if(han>=5){base=2000;rank='満貫';}else{base=fu*Math.pow(2,2+han);if(base>=2000){base=2000;rank='満貫';}}
  const d=ctx.dealer,t=ctx.tsumo;let total,bd;
  if(d){if(t){const e=up100(base*2);total=e*3;bd=e.toLocaleString()+' オール';}else{total=up100(base*6);bd='放銃 '+total.toLocaleString();}}
  else{if(t){const pd=up100(base*2),pc=up100(base*1);total=pd+pc*2;bd='子'+pc.toLocaleString()+' / 親'+pd.toLocaleString();}else{total=up100(base*4);bd='放銃 '+total.toLocaleString();}}
  return{total,rank,bd};}
function scoreYakuman(m,ctx){const base=8000*m,d=ctx.dealer,t=ctx.tsumo;let total,bd;
  if(d){if(t){const e=base*2;total=e*3;bd=e.toLocaleString()+' オール';}else{total=base*6;bd='放銃 '+(base*6).toLocaleString();}}
  else{if(t){total=base*2+base*2;bd='子'+base.toLocaleString()+' / 親'+(base*2).toLocaleString();}else{total=base*4;bd='放銃 '+(base*4).toLocaleString();}}
  return{total,bd};}
function suitAllSame(c){let s=-1;for(let i=0;i<27;i++)if(c[i]>0){const x=Math.floor(i/9);if(s<0)s=x;else if(s!==x)return false;}return true;}
function isChuuren(c){let s=-1;for(let i=0;i<27;i++)if(c[i]>0){const x=Math.floor(i/9);if(s<0)s=x;else if(s!==x)return false;}
  for(let i=27;i<34;i++)if(c[i]>0)return false;if(s<0)return false;const b=s*9,need=[3,1,1,1,1,1,1,1,3];let ex=0;
  for(let k=0;k<9;k++){const e=c[b+k]-need[k];if(e<0)return false;ex+=e;}return ex===1;}

function analyzeFull(decomp,calls,winTile,inPair,meldIdx,full,ctx,menzen){
  const conc=decomp.melds.map(m=>({type:m.type,t:m.t,open:false,kan:false,hand:true}));
  const all=conc.concat(calls);
  const pair=decomp.pair;
  const shuns=all.filter(m=>m.type==='shun'),kous=all.filter(m=>m.type==='kou');
  const isYakuhai=i=>DRAGONS.includes(i)||i===ctx.roundWind||i===ctx.seatWind;
  const K=(o,c)=>menzen?c:o;
  let wait='ryanmen';
  if(inPair)wait='tanki';
  else if(meldIdx>=0){const m=conc[meldIdx];
    if(m.type==='kou')wait='shanpon';
    else if(winTile===m.t+1)wait='kanchan';
    else if(winTile===m.t)wait=(m.t%9===6)?'penchan':'ryanmen';
    else wait=(m.t%9===0)?'penchan':'ryanmen';}
  function isConcKou(m){if(m.type!=='kou')return false;
    if(m.hand){if(!ctx.tsumo&&wait==='shanpon'&&meldIdx>=0&&conc[meldIdx]===m)return false;return true;}
    return m.kan&&!m.open;}
  const ankou=kous.filter(isConcKou).length;
  const kanCount=kous.filter(m=>m.kan).length;

  const ym=[];
  if(kanCount===4)ym.push(['四槓子',1]);
  if(kous.length>=4&&ankou===4)ym.push(wait==='tanki'?['四暗刻単騎',2]:['四暗刻',1]);
  if(DRAGONS.every(dr=>kous.some(m=>m.t===dr)))ym.push(['大三元',1]);
  let allH=true;for(let i=0;i<27;i++)if(full[i]>0)allH=false;if(allH)ym.push(['字一色',1]);

    px=lx+dx*userZoom;py=ly+dy*userZoom;pz=lz+dz*userZoom;

  camera.up.set(L(a.up[0],b.up[0]),L(a.up[1],b.up[1]),L(a.up[2],b.up[2])).normalize();

      g.shadowColor='rgba(0,0,0,.5)';g.shadowBlur=H*0.012;g.fillText(r.rank,cx,H*0.83);g.shadowBlur=0;}
    const sTxt=Math.round(scoreVal).toLocaleString()+'点';
    g.font=`800 ${H*0.16}px "Hiragino Kaku Gothic ProN",sans-serif`;g.fillStyle='#ecd183';
    g.shadowColor='rgba(0,0,0,.55)';g.shadowBlur=H*0.022;g.shadowOffsetY=H*0.005;g.fillText(sTxt,cx,H*0.955);g.shadowBlur=0;g.shadowOffsetY=0;
  }
  resultTex.needsUpdate=true;
}

function onPick(e){
  if(fallen||!tiles.length)return;
  const rect=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-rect.left)/rect.width)*2-1;
  pointer.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(tiles.map(t=>t.mesh),false);
  if(hits.length){const mesh=hits[0].object,idx=tiles.findIndex(t=>t.mesh===mesh);
    if(idx>=0){winPos=idx;ensureCtx();clack();render();}}
}
/* ---- pinch zoom + first-person sway ---- */
function onPtrDown(e){ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){const p=[...ptrs.values()];
    pinchStartDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);pinchStartZoom=userZoom;}}
function onPtrMove(e){
  if(ptrs.has(e.pointerId))ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size>=2){const p=[...ptrs.values()];const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchStartDist>0&&d>0)userZoom=Math.min(1.8,Math.max(0.55,pinchStartZoom*(pinchStartDist/d)));return;}
  const rect=renderer.domElement.getBoundingClientRect();
  const nx=((e.clientX-rect.left)/rect.width)*2-1,ny=((e.clientY-rect.top)/rect.height)*2-1;
  tgtSwayX=nx*0.55;tgtSwayY=-ny*0.36;}
function onPtrUp(e){ptrs.delete(e.pointerId);if(ptrs.size<2)pinchStartDist=0;}

/* falling + reveal */
function fallAndReveal(r){
  ensureCtx();
  const place=(t,e)=>{const s=t.stand,f=t.flat;
    t.mesh.rotation.x=-Math.PI/2*e;
    t.mesh.position.y=T.H/2+(T.D/2-T.H/2)*e;
    t.outer.position.x=s.x+(f.x-s.x)*e;
    t.outer.position.z=s.z+(f.z-s.z)*e;
    t.outer.rotation.y=f.yaw*e;};
  if(reduce){fallen=true;camP=1;applyCam();tiles.forEach(t=>place(t,1));showResult(r,true);return;}
  fallen=true;gong();
  tween(1000,0,(e)=>{camP=e;applyCam();});
  const n=tiles.length;
  tiles.forEach((t,k)=>tween(470,k*55,(e)=>place(t,e)));
  const fallEnd=(n-1)*55+470;
  setTimeout(()=>showResult(r,false),fallEnd+260);
}

/* ============ result on felt + scroll menu ============ */
function scrollToResult(){document.getElementById('resultpanel').scrollIntoView({behavior:reduce?'auto':'smooth',block:'start'});}
function scrollToTable(){document.getElementById('stage').scrollIntoView({behavior:reduce?'auto':'smooth',block:'start'});}
function setMode(m){const isR=m==='result';
  document.getElementById('topbar').style.display=isR?'none':'';
  document.getElementById('palbar').style.display=isR?'none':'';
  document.getElementById('cntpill').style.display=isR?'none':'';

function showResult(r,instant){
  if(!resultPlane)return;
  setMode('result');resultPlane.visible=true;
  const bd=document.getElementById('rp-bd'),btns=document.getElementById('rp-btns'),hint=document.getElementById('rp-hint');
  hint.style.display='none';btns.classList.remove('show');
  bd.textContent=r.bd+(r.yakuman?'':'　'+r.han+'翻 '+r.fu+'符');
  if(instant){drawResultTexture(r,r.yaku.length,r.total);resultPlane.material.opacity=1;btns.classList.add('show');throwTenbo(r.total,true);return;}
  drawResultTexture(r,0,0);resultPlane.material.opacity=0;
  tween(420,0,e=>resultPlane.material.opacity=e);
  const list=r.yaku,fu=r.fu,dealer=S.dealer,childCtx={dealer:false,tsumo:S.tsumo},step=r.yakuman?470:340,t0=320;
  let shown=0;
  const animScore=(k,target,dur)=>{const f=shown,s=performance.now();
    (function st(n){const p=Math.min(1,(n-s)/dur),e=1-Math.pow(1-p,3);shown=f+(target-f)*e;drawResultTexture(r,k,shown);
      if(p<1)requestAnimationFrame(st);else{shown=target;drawResultTexture(r,k,target);}})(performance.now());};
  let cum=0;
  list.forEach((y,i)=>setTimeout(()=>{ding(i);cum+=y.han;
    let target=r.yakuman?scoreYakuman(cum/13,childCtx).total:scoreHanFu(cum,fu,childCtx).total;
    if(i===list.length-1&&!dealer)target=r.total;animScore(i+1,target,300);
  },t0+i*step));
  let end;const base=t0+list.length*step;
  if(dealer){setTimeout(()=>animScore(list.length,r.total,640),base+180);end=base+180+660;}else end=t0+(list.length-1)*step+300+120;
  setTimeout(()=>btns.classList.add('show'),end+180);
  setTimeout(()=>throwTenbo(r.total,false),end+280);   // 役・点数表示の後に点棒を放り投げる
}
function hideResult(){
  if(resultPlane){resultPlane.visible=false;resultPlane.material.opacity=0;}
  setMode('build');
  const hint=document.getElementById('rp-hint');if(hint)hint.style.display='';
  const bd=document.getElementById('rp-bd');if(bd)bd.textContent='';
  const btns=document.getElementById('rp-btns');if(btns)btns.classList.remove('show');

}

/* ============ 点棒（支払い）演出 ============ */
/* 点数分の点棒を画面手前（+z）外の上空から放物線で卓上へ放り投げる。
   俯瞰カメラ（up=[0,0,-1]）なので +z が画面手前。盤面中央のスコアを避け、右下寄りに山を作る。 */
let tenbos=[];                              // 現在卓上の点棒メッシュ
const TENBO={L:1.5,W:0.17,H:0.09};          // 点棒の寸法（長辺/幅/高さ・視認性重視で大きめ）
let tenboTexCache={};
// 点棒の上面テクスチャ（額面ごとに点パターンを変える）
function tenboTexture(denom){
  if(tenboTexCache[denom])return tenboTexCache[denom];
  const W=512,H=64,c=document.createElement('canvas');c.width=W;c.height=H;const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#f8f2e3');grd.addColorStop(0.5,'#efe7d2');grd.addColorStop(1,'#e3d8be');
  g.fillStyle=grd;g.fillRect(0,0,W,H);
  const cy=H/2;
  const dot=(x,r,col)=>{g.beginPath();g.arc(x,cy,r,0,Math.PI*2);g.fillStyle=col;g.fill();
    g.lineWidth=1.4;g.strokeStyle='rgba(0,0,0,.18)';g.stroke();};
  const row=(n,r,col,span)=>{const s=span||W*0.78,x0=W/2-s/2;
    for(let i=0;i<n;i++)dot(x0+(n>1?s*(i/(n-1)):s/2),r,col);};
  if(denom===100){ row(8,5,'#1d1d1d'); }                                   // 100点：黒点
  else if(denom===1000){ row(5,8,'#d8352a'); }                            // 1000点：赤点
  else if(denom===5000){                                                  // 5000点：中央青＋赤
    dot(W/2,12,'#2f6fd0');[W*0.30,W*0.70].forEach(x=>dot(x,8,'#d8352a'));
    [W*0.12,W*0.88].forEach(x=>dot(x,6,'#2f6fd0'));
  } else {                                                                // 10000点：金中央＋虹
    dot(W/2,14,'#e8b53a');
    const cols=['#d8352a','#2f6fd0','#3aa758','#d8352a','#2f6fd0','#3aa758'];
    [W*0.18,W*0.31,W*0.40,W*0.60,W*0.69,W*0.82].forEach((x,i)=>dot(x,7,cols[i]));
  }
  const t=new THREE.CanvasTexture(c);t.anisotropy=4;if(THREE.sRGBEncoding!==undefined)t.encoding=THREE.sRGBEncoding;
  return tenboTexCache[denom]=t;
}
function makeTenbo(denom){
  // FBXモデルがあればそれを使う（テクスチャは牌と同じ Mahjong.png）
  if(tenboGeoms&&tenboGeoms[denom]){
    const mat=new THREE.MeshStandardMaterial({map:atlasTex,roughness:0.5,metalness:0.0});
    const mesh=new THREE.Mesh(tenboGeoms[denom],mat);
    mesh.castShadow=true;mesh.receiveShadow=true;return mesh;
  }
  // フォールバック：手作りの箱＋点テクスチャ
  const geo=new THREE.BoxGeometry(TENBO.L,TENBO.H,TENBO.W);
  const body=new THREE.MeshStandardMaterial({color:0xeee4cd,roughness:0.55,metalness:0.0});
  const top=new THREE.MeshStandardMaterial({map:tenboTexture(denom),roughness:0.5,metalness:0.0});
  // BoxGeometryの面順 [+x,-x,+y,-y,+z,-z]：上面(+y, index2)だけ点パターン
  const mesh=new THREE.Mesh(geo,[body,body,top,body,body,body]);
  mesh.userData.ownGeo=true;
  mesh.castShadow=true;mesh.receiveShadow=true;return mesh;
}
// 点棒FBX（assets/Mahjong_Tenbow.fbx）の各額面を読み込み TENBO 寸法へ正規化
let tenboGeoms=null;
function loadTenboFBX(cb){
  if(!THREE||!THREE.FBXLoader){cb&&cb(false);return;}
  new THREE.FBXLoader().load('assets/Mahjong_Tenbow.fbx',obj=>{
    try{
      obj.updateWorldMatrix(true,true);
      const byName={};obj.traverse(c=>{if(c.isMesh)byName[c.name]=c;});
      const map={100:'TenBow_100',1000:'TenBow_1000',5000:'TenBow_5000',10000:'TenBow_10000'};
      const out={};
      Object.keys(map).forEach(d=>{
        const m=byName[map[d]];if(!m||!m.geometry)return;
        const g=m.geometry.clone();g.applyMatrix4(m.matrixWorld);
        g.computeBoundingBox();const ctr=new THREE.Vector3();g.boundingBox.getCenter(ctr);g.translate(-ctr.x,-ctr.y,-ctr.z);
        let sz=new THREE.Vector3();g.computeBoundingBox();g.boundingBox.getSize(sz);
        // 一番薄い軸を厚み(y)へ：印字面の法線＝薄い軸なので、印字面が上(+y)になる
        if(sz.x<=sz.y&&sz.x<=sz.z){g.rotateZ(Math.PI/2);}        // 薄い軸がx → y へ
        else if(sz.z<=sz.x&&sz.z<=sz.y){g.rotateX(Math.PI/2);}   // 薄い軸がz → y へ
        g.computeBoundingBox();g.boundingBox.getSize(sz);
        if(sz.z>sz.x){g.rotateY(Math.PI/2);g.computeBoundingBox();g.boundingBox.getSize(sz);} // 長辺を x へ
        g.scale(TENBO.L/sz.x,TENBO.H/sz.y,TENBO.W/sz.z);g.computeVertexNormals();
        out[d]=g;
      });
      tenboGeoms=Object.keys(out).length?out:null;
      cb&&cb(!!tenboGeoms);
    }catch(e){console.warn('tenbo fbx build failed',e);cb&&cb(false);}
  },undefined,err=>{console.warn('tenbo fbx load error',err);cb&&cb(false);});
}
// 点数を 10000/5000/1000/100 の点棒へ分解（安全のため枚数上限）
function tenboBreakdown(total){
  const denoms=[10000,5000,1000,100];let rem=Math.max(0,Math.round(total));const out=[];
  denoms.forEach(d=>{let c=Math.floor(rem/d);rem-=c*d;while(c-->0)out.push(d);});
  return out.slice(0,14);
}
function clearTenbo(){if(!scene)return;
  // FBXジオメトリは共有なので破棄しない。手作り箱(ownGeo)のみ破棄。
  tenbos.forEach(m=>{scene.remove(m);if(m.userData&&m.userData.ownGeo&&m.geometry)m.geometry.dispose();});tenbos=[];}
function throwTenbo(total,instant){
  if(!THREE_OK||!scene)return;clearTenbo();
  const list=tenboBreakdown(total);if(!list.length)return;
  // 倒れた牌に被らない右下（+x=右, +z=手前）の空きスペースへ着地。散らばりは控えめ。
  const cx=1.9,cz=3.6;
  list.forEach((denom,k)=>{
    const mesh=makeTenbo(denom);
    // やや散らした着地点・向き（控えめ。きれいに並びすぎない程度）
    const tx=cx+rndJ(0.45), tz=cz+rndJ(0.4), yaw=rndJ(Math.PI*0.45);
    const ty=TENBO.H*0.5+0.02;
    if(instant){mesh.position.set(tx,ty,tz);mesh.rotation.set(0,yaw,0);scene.add(mesh);tenbos.push(mesh);return;}
    // 画面手前外（+z＝画面下）のすぐ外から放物線で飛び込む
    const sx=tx+rndJ(0.6), sz=5.8+rndJ(0.4), sy=2.1+rndJ(0.3);
    mesh.position.set(sx,sy,sz);
    const dx=tx-sx,dz=tz-sz,dl=Math.hypot(dx,dz)||1,ndx=dx/dl,ndz=dz/dl; // 進行方向（着地後の転がり用）
    const spin0=(Math.random()*2-1)*Math.PI*1.5, tilt0=(Math.random()*2-1)*0.9;
    const rollExtra=(Math.random()*2-1)*0.6, slide=0.10+Math.random()*0.16; // 着地後の追加回転と滑り
    scene.add(mesh);tenbos.push(mesh);
    tween(540,k*100,(e,p)=>{
      mesh.position.x=sx+(tx-sx)*e;mesh.position.z=sz+(tz-sz)*e;
      mesh.position.y=sy+(ty-sy)*e+Math.sin(Math.PI*p)*0.9; // 放物線
      mesh.rotation.y=yaw+spin0*(1-e);mesh.rotation.x=tilt0*(1-e);
    },()=>{
      clack();
      // 着地後に少し転がって止まる：進行方向へ滑りつつ小バウンド＋回転して減速
      tween(280,0,(e,p)=>{
        mesh.position.x=tx+ndx*slide*e;mesh.position.z=tz+ndz*slide*e;
        mesh.position.y=ty+Math.sin(Math.PI*p)*0.05*(1-p);
        mesh.rotation.y=yaw+rollExtra*e;mesh.rotation.x=0;
      },()=>{mesh.position.set(tx+ndx*slide,ty,tz+ndz*slide);mesh.rotation.set(0,yaw+rollExtra,0);});
    });
  });
}

/* ============ render / state ============ */
function render(){
  sortedHand=hand.slice().sort((a,b)=>a-b);
  if(sortedHand.length){if(winPos>=sortedHand.length)winPos=sortedHand.length-1;if(winPos<0)winPos=sortedHand.length-1;}else winPos=0;
  winTile=sortedHand.length?sortedHand[winPos]:null;
  buildHand();
  document.getElementById('cnt').textContent=hand.length;
  const names=['一','二','三','四','五','六','七','八','九'];
  let wl='';if(winTile!=null){const suit=winTile<27?Math.floor(winTile/9):3,n=winTile%9;
    wl='あがり牌：'+(winTile<27?names[n]+['萬','筒','索'][suit]:['東','南','西','北','白','發','中'][winTile-27]);}
  document.getElementById('wlab').textContent=wl;
  compute();
}
function compute(){
  hideResult();
  const calc=document.getElementById('calc'),st=document.getElementById('status');
  if(hand.length<14){lastValid=false;lastResult=null;calc.disabled=true;calc.classList.remove('ready');
    st.textContent=hand.length===0?'牌を並べてください':'あと '+(14-hand.length)+' 枚';return;}
  const r=calcHand(hand,[],buildCtx());
  if(r.error){lastValid=false;lastResult=null;calc.disabled=true;calc.classList.remove('ready');
    st.textContent=r.error;return;}
  lastResult=r;lastValid=true;calc.disabled=false;calc.classList.add('ready');
  st.textContent='「計算開始」を押せます';
}

/* ============ UI wiring ============ */
function buildPalette(suit){
  const pal=document.getElementById('pal');pal.innerHTML='';pal.classList.toggle('honors',suit===3);
  const list=suit<3?[0,1,2,3,4,5,6,7,8].map(n=>suit*9+n):[27,28,29,30,31,32,33];
  list.forEach(i=>{const b=document.createElement('button');const im=new Image();im.src=palImg(i);im.alt='';b.appendChild(im);
    b.onclick=()=>addTile(i);pal.appendChild(b);});
}
function addTile(i){if(hand.length>=14)return;ensureCtx();hand.push(i);winPos=hand.slice().sort((a,b)=>a-b).indexOf(i);
  // 末尾に入れた牌をあがり牌に（同種は最後の位置）
  const sorted=hand.slice().sort((a,b)=>a-b);let idx=-1;for(let k=0;k<sorted.length;k++)if(sorted[k]===i)idx=k;winPos=idx;
  clack();render();}
function bindSeg(id,fn){const box=document.getElementById(id);box.querySelectorAll('button').forEach(b=>{b.onclick=()=>{
  box.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');fn(b.dataset.v);render();};});}

document.getElementById('undo').onclick=()=>{hand.pop();render();};
document.getElementById('clear').onclick=()=>{hand=[];winPos=0;render();};
document.getElementById('calc').onclick=()=>{if(lastValid&&lastResult){ensureCtx();fallAndReveal(lastResult);}};
document.getElementById('rp-again').onclick=()=>{if(!lastResult)return;scrollToTable();
  setTimeout(()=>{if(resultPlane)resultPlane.visible=false;buildHand();setTimeout(()=>fallAndReveal(lastResult),150);},reduce?0:520);};
document.getElementById('rp-edit').onclick=()=>{buildHand();hideResult();scrollToTable();};
document.getElementById('scrollcue').onclick=scrollToResult;
document.getElementById('tabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  document.getElementById('tabs').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');buildPalette(+b.dataset.s);});
// 親/子・ロン/ツモは設定パネルとスクロール先の両方を同期
function syncSeg(id,val){const box=document.getElementById(id);if(!box)return;
  box.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.v===val));}
function setDealer(v){S.dealer=v;syncSeg('who',v?'oya':'ko');syncSeg('who2',v?'oya':'ko');render();}
function setTsumo(v){S.tsumo=v;syncSeg('win',v?'tsumo':'ron');syncSeg('win2',v?'tsumo':'ron');
  if(v&&S.houtei){S.houtei=false;document.getElementById('houtei').classList.remove('on');}
  if(!v&&S.haitei){S.haitei=false;document.getElementById('haitei').classList.remove('on');}
  render();}
['who','who2'].forEach(id=>document.getElementById(id).querySelectorAll('button')
  .forEach(b=>b.onclick=()=>setDealer(b.dataset.v==='oya')));
['win','win2'].forEach(id=>document.getElementById(id).querySelectorAll('button')
  .forEach(b=>b.onclick=()=>setTsumo(b.dataset.v==='tsumo')));
// 特殊役トグル（海底/河底は排他、それぞれツモ/ロンを自動設定）
const _hb=document.getElementById('haitei'),_ho=document.getElementById('houtei'),_ip=document.getElementById('ippatsu');
_hb.onclick=()=>{S.haitei=!S.haitei;_hb.classList.toggle('on',S.haitei);
  if(S.haitei){S.houtei=false;_ho.classList.remove('on');setTsumo(true);}else render();};
_ho.onclick=()=>{S.houtei=!S.houtei;_ho.classList.toggle('on',S.houtei);
  if(S.houtei){S.haitei=false;_hb.classList.remove('on');setTsumo(false);}else render();};
_ip.onclick=()=>{S.ippatsu=!S.ippatsu;_ip.classList.toggle('on',S.ippatsu);render();};
bindSeg('riichi',v=>{S.riichi=(v==='on'||v==='double');S.dbl=(v==='double');});
bindSeg('round',v=>S.roundWind=+v);
bindSeg('seat',v=>S.seatWind=+v);
document.getElementById('dp').onclick=()=>{S.dora=Math.min(20,S.dora+1);document.getElementById('dv').textContent=S.dora;render();};
document.getElementById('dm').onclick=()=>{S.dora=Math.max(0,S.dora-1);document.getElementById('dv').textContent=S.dora;render();};
document.getElementById('gear').onclick=()=>document.getElementById('setwrap').classList.add('show');
document.getElementById('setclose').onclick=()=>document.getElementById('setwrap').classList.remove('show');
document.getElementById('setwrap').onclick=(e)=>{if(e.target.id==='setwrap')e.currentTarget.classList.remove('show');};
document.getElementById('snd').onclick=()=>{soundOn=!soundOn;const b=document.getElementById('snd');
  b.classList.toggle('on',soundOn);b.textContent=soundOn?'効果音':'消音';if(soundOn)ensureCtx();};

document.getElementById('startbtn').onclick=()=>{ensureCtx();document.body.classList.add('started');};

buildPalette(0);
loadThree(ok=>{
  const st=document.getElementById('status');
  if(!ok||!window.THREE){THREE_OK=false;document.getElementById('threefail').style.display='flex';st.textContent='';return;}
  try{THREE_OK=true;initScene();st.textContent='牌を並べてください';render();
    if(DOF_ON)loadPost(ok2=>{if(!ok2)return;try{initComposer();usePost=true;}catch(e){console.warn('DoF init failed',e);usePost=false;}});
    if(USE_FBX)loadFBXTiles(ok3=>{if(ok3){loadTenboFBX(()=>{});render();}});}
  catch(e){console.warn(e);THREE_OK=false;document.getElementById('threefail').style.display='flex';st.textContent='';}
});
